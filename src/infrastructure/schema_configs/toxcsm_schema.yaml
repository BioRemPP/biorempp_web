      source: "Huang et al., 2016"
    - endpoint: "NR-AR-LBD"
      label_column: "label_NR_AR_LBD"
      value_column: "value_NR_AR_LBD"
      description: "Androgen receptor ligand-binding domain"
      samples: "6922 (6698/224)"
      source: "Huang et al., 2016"
    - endpoint: "NR-Aromatase"
      label_column: "label_NR_Aromatase"
      value_column: "value_NR_Aromatase"
      description: "Aromatase enzyme inhibition"
      samples: "5961 (5664/297)"
      source: "Huang et al., 2016"
    - endpoint: "NR-ER"
      label_column: "label_NR_ER"
      value_column: "value_NR_ER"
      description: "Estrogen receptor binding"
      samples: "6437 (5725/712)"
      source: "Huang et al., 2016"
    - endpoint: "NR-ER-LBD"
      label_column: "label_NR_ER_LBD"
      value_column: "value_NR_ER_LBD"
      description: "Estrogen receptor ligand-binding domain"
      samples: "7133 (6813/320)"
      source: "Huang et al., 2016"
    - endpoint: "NR-GR"
      label_column: "label_NR_GR"
      value_column: "value_NR_GR"
      description: "Glucocorticoid receptor binding"
      samples: "6055 (5454/601)"
      source: "Sun et al., 2019"
    - endpoint: "NR-PPAR-gamma"
      label_column: "label_NR_PPAR_gamma"
      value_column: "value_NR_PPAR_gamma"
