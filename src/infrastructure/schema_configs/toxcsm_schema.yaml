      source: "Sun et al., 2019"

  stress_response:
    - endpoint: "SR-ARE"
      label_column: "label_SR_ARE"
      value_column: "value_SR_ARE"
      description: "Antioxidant response element activation"
      samples: "5956 (5014/942)"
      source: "Huang et al., 2016"
    - endpoint: "SR-ATAD5"
      label_column: "label_SR_ATAD5"
      value_column: "value_SR_ATAD5"
      description: "DNA damage/genotoxicity stress response"
      samples: "7251 (6999/252)"
      source: "Huang et al., 2016"
    - endpoint: "SR-HSE"
      label_column: "label_SR_HSE"
      value_column: "value_SR_HSE"
      description: "Heat shock response element activation"
      samples: "6613 (6257/356)"
      source: "Huang et al., 2016"
    - endpoint: "SR-MMP"
      label_column: "label_SR_MMP"
      value_column: "value_SR_MMP"
      description: "Mitochondrial membrane potential disruption"
      samples: "6094 (5163/931)"
      source: "Huang et al., 2016"
    - endpoint: "SR-p53"
      label_column: "label_SR_p53"
      value_column: "value_SR_p53"
      description: "Tumor suppressor p53 pathway activation"
      samples: "7112 (6686/426)"
      source: "Huang et al., 2016"

# Value columns info
value_columns_info:
  data_type: "float64"
  range: "0.0 - 1.0"
  interpretation: "Higher values indicate stronger prediction confidence"
  usage: "Threshold-based classification, ranking, quantitative risk assessment"

# Schema constraints
constraints:
  primary_key: "cpd"
  primary_key_note: "KEGG Compound ID — unique per row"
  foreign_keys:
    - column: "cpd"
      references: "KEGG Compound database"
    - column: "cpd"
      references: "BioRemPP Database"
    - column: "ChEBI"
      references: "ChEBI database"

# Data quality
data_quality:
  completeness:
    status: "100%"
    description: "Zero missing values across all 66 columns"
  accuracy:
    - column: "SMILES, cpd, compoundname"
      source: "KEGG Compound database"
    - column: "ChEBI"
      source: "ChEBI database cross-reference"
    - column: "Toxicity predictions"
      source: "ToxCSM QSAR models"
  source: "ToxCSM (Toxicity Computational Structural Model) web server predictions"

# Usage examples
usage_examples:
  r: |
    library(readr)
    db <- read_delim("path/toxcsm_db.csv", delim=";")
    
    # View identifier columns
    head(db[, c("cpd", "compoundname", "ChEBI")])
    
    # View ecotoxicity labels
    head(db[, c("compoundname", "label_Avian", "label_Crustacean")])
  python: |
    import pandas as pd
    
    db = pd.read_csv("path/toxcsm_db.csv", sep=";")
    
    # Filter high toxicity compounds
    high_tox = db[db['label_hERG_I_Inhibitor'] == 'High Toxicity']
    
    # Get average toxicity scores
    value_cols = [c for c in db.columns if c.startswith('value_')]
    db[value_cols].mean()
  common_queries:
    - description: "Find compounds with high cardiotoxicity risk"
      code: 'high_herg <- db[db$label_hERG_I_Inhibitor == "High Toxicity", ]'
    - description: "Rank compounds by biodegradation"
      code: 'ranked <- db[order(-db$value_Biodegradation), c("compoundname", "value_Biodegradation")]'

