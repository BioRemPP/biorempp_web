# Database Schemas Index Page Configuration
# Used by schema_renderer.py to generate the schemas index page

page_id: "database-schemas-index"
title: "Database Schemas"
subtitle: "Formal specifications of all databases integrated into BioRemPP"
icon: "fa-database"

# Navigation table data
databases:
  - id: "biorempp"
    name: "BioRemPP"
    rows: 10869
    columns: 8
    focus: "Compound-gene-enzyme-agency relationships"
    route: "/schemas/biorempp"
    color: "success"
    join_key: "ko"
    file: "biorempp_db.csv"
    
  - id: "hadeg"
    name: "HADEG"
    rows: 867
    columns: 4
    focus: "Hydrocarbon aerobic degradation genes"
    route: "/schemas/hadeg"
    color: "info"
    join_key: "ko"
    file: "hadeg_db.csv"
    
  - id: "kegg"
    name: "KEGG"
    rows: 855
    columns: 3
    focus: "Xenobiotic/pollutant degradation pathways"
    route: "/schemas/kegg"
    color: "warning"
    join_key: "ko"
    file: "kegg_degradation_db.csv"
    
  - id: "toxcsm"
    name: "ToxCSM"
    rows: 370
    columns: 66
    focus: "Toxicological predictions (31 endpoints)"
    route: "/schemas/toxcsm"
    color: "danger"
    join_key: "cpd"
    file: "toxcsm_db.csv"

# Common file format specification
file_format:
  format: "CSV (Comma-Separated Values)"
  delimiter: "Semicolon (;)"
  encoding: "UTF-8"
  header: true
  text_qualifier: 'Double quote (")'
  completeness: "100% (zero missing values)"

# Overview content
overview:
  formal_specs: "Column types, formats, patterns, and controlled vocabularies"
  validation_rules: "Regex patterns, cardinality constraints, completeness requirements"
  cross_references: "Foreign key relationships and integration points between databases"
  usage_examples: "Code snippets for loading and querying each database"

# Integration architecture
integration:
  description: >
    User KO annotations are joined with BioRemPP, HADEG, and KEGG databases via the 'ko' column.
    ToxCSM is joined via the 'cpd' column from BioRemPP compounds.
  join_points:
    - databases: ["BioRemPP", "HADEG", "KEGG"]
      key: "ko"
      description: "KEGG Orthology ID"
    - databases: ["ToxCSM"]
      key: "cpd"
      description: "KEGG Compound ID (from BioRemPP)"

# Related documentation links
related_docs:
  - title: "Data Sources"
    url: "https://biorempp-web.readthedocs.io/en/latest/methods/data-sources/"
  - title: "Mapping Strategy"
    url: "https://biorempp-web.readthedocs.io/en/latest/methods/mapping-strategy/"
  - title: "GitHub Repository"
    url: "https://github.com/BioRemPP/biorempp_web"

# Contact info
contact:
  github_issues: "https://github.com/BioRemPP/biorempp_db/issues"
  email: "biorempp@gmail.com"
