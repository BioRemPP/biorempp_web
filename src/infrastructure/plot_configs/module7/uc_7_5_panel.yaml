# UC-7.5: Interactive Distribution of Toxicity Scores by Endpoint
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-7-5"

scientific_question: >
  Within a broad toxicological domain (e.g., Genomic Toxicity), what are the
  probability distributions of predicted toxicity scores across its specific
  endpoints, and which endpoints exhibit the highest median predicted scores
  or greatest score variability?

description: >
  This interactive visualization allows for the detailed exploration of the
  predicted toxicity scores from the ToxCSM dataset. By selecting a high-level
  toxicity category from the dropdown menu, the plot dynamically updates to
  display a series of overlaid kernel density estimate (KDE) curves. Each curve
  represents the distribution of predicted toxicity scores for a specific
  toxicological endpoint within that category, allowing for direct comparison
  of their shapes, peaks, and spreads.

visual_elements:
  - label: "Dropdown Menu"
    description: >
      Use this to select the Toxicity Super-Category (e.g., Genomic, Environmental)
      to analyze. The plot will update automatically.

  - label: "X-axis"
    description: >
      Represents the predicted Toxicity Score, typically ranging from 0 (low
      predicted score) to 1 (high predicted score).

  - label: "Y-axis"
    description: >
      Represents the Probability Density. The area under each curve sums to 1.

  - label: "Overlaid Curves"
    description: >
      Each colored, semi-transparent curve represents the distribution of
      predicted scores for a single Toxicological Endpoint. The legend
      identifies which color corresponds to which endpoint.

interpretation_guidelines:
  - >
    High-Scoring Endpoints: The position of the peaks (modes) of the curves
    reveals where predicted scores are most concentrated for each endpoint.
    A curve with a peak shifted to the right (towards 1.0) indicates an
    endpoint where high predicted scores are more common for compounds in
    this dataset. These are model-derived distributions.

  - >
    Score Variability: A tall, narrow peak indicates low variability in
    predicted scores for an endpoint — most compounds receive similar predicted
    scores. A short, wide curve indicates high variability across compounds
    for that endpoint.

  - >
    Comparative Score Profiles: The plot allows for direct comparison of
    predicted score distributions across endpoints. By observing the shapes
    and positions of the overlaid curves, one can assess which endpoints tend
    toward higher or more variable predicted scores within a given toxicological
    category.

color_scheme: "success"
