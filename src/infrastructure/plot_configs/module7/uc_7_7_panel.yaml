# UC-7.7: Sample Gene Annotation Depth for High Predicted-Risk Compounds
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-7-7"

scientific_question: >
  Which biological samples have the highest gene annotation counts co-occurring
  with high predicted-risk compounds, and how is this annotation depth distributed
  across toxicological categories and specific compounds?

description: >
  This visualization creates a gene annotation depth profile for each sample
  relative to high predicted-risk compounds. In contrast to measuring the variety
  of compounds covered, this treemap quantifies the total gene annotation count
  per sample for those compounds. The size of each rectangle is proportional to
  the total number of gene-compound annotation links for high predicted-risk
  compounds, highlighting where each sample has the greatest annotation depth.
  The hierarchy follows: Sample → Toxicity Category → Compound Name.

visual_elements:
  - label: "Nested Rectangles (Hierarchy)"
    description: >
      The chart uses nested rectangles to represent the hierarchy. The largest
      rectangles represent the top-level categories (Sample). Within each sample,
      rectangles represent Toxicity Categories, and within those, individual
      Compound Names.

  - label: "Rectangle Area (Values)"
    description: >
      The area of each rectangle is proportional to the total number of
      gene-compound annotation links for that category. Larger areas indicate
      greater annotation depth for those high predicted-risk compounds.

  - label: "Color (Toxicity Category)"
    description: >
      The color of the second-level rectangles identifies the Toxicity Category
      (e.g., Genomic, Environmental, Nuclear Response), allowing for easy visual
      grouping across samples.

  - label: "Interactivity"
    description: >
      You can click on any rectangle to "zoom in" and explore that specific
      branch of the hierarchy in more detail. Click outside to zoom back out.

interpretation_guidelines:
  - >
    High Annotation Count: Large rectangles represent a high gene annotation
    count for a sample within a specific risk category or compound. This reflects
    annotation depth in the reference database and does not confirm a confirmed
    functional response or multi-gene biotransformation capacity.

  - >
    Category-Level Annotation Depth: By observing the second level of the
    hierarchy, one can identify which toxicological categories have more
    gene annotations for a given sample. This is an annotation-level
    observation and does not confirm functional specialization.

  - >
    Broadly Annotated Compounds: A compound that forms a large rectangle within
    a sample-category combination has many gene annotations co-occurring with it
    for that sample. This reflects annotation breadth in the database and does
    not confirm that the compound requires a diverse enzymatic response.

  - >
    Complementary Annotation Depth Profiles: Samples with annotation depth
    concentrated in different toxicological categories show complementary
    annotation depth profiles. Identifying such patterns can serve as a
    starting point for exploratory analyses, though any functional inference
    requires experimental validation beyond annotation and prediction data.

color_scheme: "success"
