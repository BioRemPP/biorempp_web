# UC-7.1: Faceted Heatmap of Predicted Compound Toxicity Profiles
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-7-1"

scientific_question: >
  What is the predicted toxicological profile of each chemical compound
  across a wide range of risk categories, and which compounds receive
  the highest predicted scores across multiple endpoints?

description: >
  This visualization provides a predicted toxicological profile for each
  compound analyzed by the ToxCSM model. The faceted heatmap displays the
  predicted toxicity scores for each compound across numerous endpoints,
  which are grouped into five major super-categories. This allows for a
  direct comparison of the predicted scores associated with each chemical
  across toxicological domains.

visual_elements:
  - label: "Facets (Subplots)"
    description: >
      Each of the five subplots represents a major Toxicity Category:
      Nuclear Response, Stress Response, Genomic, Environmental, and Organic.
      This faceted layout allows for organized comparison across different
      toxicological domains.

  - label: "Y-Axis (Compound Names)"
    description: >
      Represents the individual Compound Names being analyzed. Each row
      corresponds to a unique chemical compound from the dataset, allowing
      the assessment of its predicted toxicological profile across all
      endpoints.

  - label: "X-Axis (Toxicological Endpoints)"
    description: >
      Represents the specific Toxicological Endpoints within each category.
      Different facets may have different numbers of endpoints depending on
      the available assays and predictions for that toxicity domain.

  - label: "Cell Color (Toxicity Score)"
    description: >
      The color intensity of each cell indicates the predicted Toxicity Score,
      typically ranging from 0 to 1. Darker, warmer colors (reds) indicate a
      higher predicted score, while lighter colors indicate lower predicted
      scores.

  - label: "Hover Information"
    description: >
      Hovering over a cell reveals the compound name, the specific endpoint,
      the predicted numerical score, and its corresponding qualitative label
      (e.g., 'High Toxicity', 'Moderate Risk') as defined by the ToxCSM model.

interpretation_guidelines:
  - >
    Compound Predicted Score Profile: By reading across a horizontal row, one
    can assess the predicted toxicological profile of a single compound across
    endpoints. Compounds with high predicted scores across multiple facets
    may warrant further investigation, bearing in mind that these are
    computational predictions and not confirmed experimental determinations.

  - >
    High-Scoring Endpoints: Vertical columns that are consistently dark across
    many compounds represent toxicological endpoints where high predicted scores
    are common for the chemicals in this dataset. These patterns are
    model-derived and should be interpreted with reference to the ToxCSM
    model's scope and limitations.

  - >
    Compounds with Broad High-Score Patterns: Compounds with numerous dark red
    cells, especially across multiple facets, receive high predicted scores
    across many endpoints. These patterns may guide prioritization of further
    investigation, but do not constitute confirmed hazard determinations.

  - >
    Category-Specific Patterns: Comparing patterns across the five facets
    helps identify compounds with predicted scores concentrated in one domain
    versus those with elevated scores across multiple domains. These are
    model predictions and do not confirm toxicological mechanisms.

  - >
    Low-Score Compounds: Compounds with predominantly light-colored cells
    across all facets receive low predicted scores across endpoints. These
    are model-derived predictions and should not be interpreted as confirmed
    safety determinations without experimental validation.

color_scheme: "success"
