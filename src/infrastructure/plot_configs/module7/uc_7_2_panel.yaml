# UC-7.2: Concordance Between Predicted Risk and Regulatory Focus
# Panel Configuration (YAML)

use_case_id: "uc-7-2"

scientific_question: >
  What is the structure and magnitude of the overlap between compounds
  monitored by regulatory agencies and those receiving high predicted
  toxicological scores from the ToxCSM model?

description: >
  This visualization maps the overlap between compounds with high predicted
  toxicological scores and those listed by various regulatory agencies. The
  chord diagram provides an overview of these relationships, where the
  connections illustrate the number of shared compounds between each
  pair of entities.

visual_elements:
  - label: "Outer Arcs"
    description: >
      Each colored arc on the circumference represents either a Regulatory
      Agency or the High Predicted Risk category. The length of the arc is
      proportional to the total number of unique compounds in that set.

  - label: "Chords (Ribbons)"
    description: >
      The ribbons flowing between two arcs represent the intersection
      between that pair of entities.

  - label: "Chord Thickness"
    description: >
      The thickness of a chord is directly proportional to the number of
      shared compounds. A thick chord indicates a large overlap.

  - label: "High Predicted Risk Node"
    description: >
      A special node representing compounds predicted to have high
      toxicological scores based on ToxCSM model analysis.

  - label: "Toxicity Threshold Selector"
    description: >
      A dropdown control to select the toxicity score threshold for defining
      high-score compounds (e.g., 0.7).

interpretation_guidelines:
  - >
    Overlap Between Lists: A thick chord between an agency and the "High
    Predicted Risk" arc indicates that a significant number of compounds
    monitored by that agency also receive high predicted scores from the
    ToxCSM model. This reflects overlap between two independent classification
    systems and does not confirm confirmed hazard for those compounds.

  - >
    Agency Compound List Scope: An agency with a large outer arc has a broad
    list of monitored compounds. By observing the chords, one can see how much
    of that list overlaps with high-score predictions and how much does not.

  - >
    Gaps in Overlap: A large "High Predicted Risk" arc with relatively thin
    chords connecting to regulatory agencies may suggest limited overlap
    between that agency's compound list and high-scoring predictions, or that
    the dataset composition influences this pattern.

  - >
    Cross-Agency Overlap: Thick chords between different regulatory agencies
    indicate shared compound lists. These overlaps reflect the scope of each
    regulatory framework and may guide further exploration of annotation coverage.

  - >
    Exploratory Prioritization: This analysis can help identify which regulatory
    frameworks show more overlap with high-predicted-score compounds. Any
    prioritization based on these patterns requires additional evidence beyond
    model predictions and annotation co-occurrence.

color_scheme: "success"
