# UC-7.6: Sample Annotation Coverage Breadth for High Predicted-Risk Compounds
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-7-6"

scientific_question: >
  Which biological samples show the broadest gene annotation coverage across
  high predicted-risk compounds, as measured by the variety of such compounds
  they are co-annotated with within each toxicological category?

description: >
  This visualization creates an annotation coverage breadth profile for each
  sample. In contrast to measuring annotation depth (gene count per compound),
  this treemap quantifies the variety of high predicted-risk compounds for which
  a sample has at least one gene annotation. The size of each rectangle is
  proportional to the number of unique high predicted-risk compounds co-annotated
  with a given sample within each toxicological category. The hierarchy follows:
  Sample → Toxicity Category.

visual_elements:
  - label: "Nested Rectangles (Hierarchy)"
    description: >
      The chart uses nested rectangles to represent the hierarchy. The largest
      rectangles represent the top-level categories (Sample). Within each sample,
      smaller rectangles represent the Toxicity Categories.

  - label: "Rectangle Area (Values)"
    description: >
      The area of each rectangle is proportional to the count of unique high
      predicted-risk compounds co-annotated with that sample within that category.
      Larger areas indicate broader annotation coverage across those compounds.

  - label: "Color (Toxicity Category)"
    description: >
      The color of the second-level rectangles identifies the Toxicity Category
      (e.g., Genomic, Environmental, Nuclear Response, Stress Response, Organic).

  - label: "Interactivity"
    description: >
      You can click on any rectangle to "zoom in" and explore that specific branch
      of the hierarchy. Click outside to zoom back out.

interpretation_guidelines:
  - >
    Broad Annotation Coverage: Samples with the largest overall area are
    co-annotated with the widest variety of high predicted-risk compounds across
    all categories. This reflects annotation breadth in the database and does
    not confirm that these samples can process or mitigate those compounds.

  - >
    Category-Level Annotation Patterns: By examining the second level of the
    hierarchy, one can identify which toxicological categories contain more
    compound annotations for a given sample. This is an annotation-level
    observation and does not confirm functional specialization.

  - >
    Complementary Annotation Profiles: Samples with annotation coverage
    concentrated in different toxicological categories show complementary
    annotation profiles. Identifying such patterns can serve as a starting
    point for exploratory analyses of annotation coverage, though any
    functional inference requires experimental validation beyond annotation
    and prediction data.

  - >
    Annotation Coverage Context: The relative sizes of toxicological categories
    within a sample reflect which categories have more compound annotations
    co-occurring with that sample. These are annotation-level patterns and
    should not be interpreted as confirmed functional capacity for risk mitigation.

color_scheme: "success"
