# UC-5.5: Gene-Gene Annotation Co-occurrence Network
# Panel Configuration (YAML)

use_case_id: "uc-5-5"

scientific_question: >
  Which genes share annotation co-occurrences with the same chemical compounds,
  and what is the structure of these annotation-based groupings?

description: >
  This visualization constructs a network to map the annotation co-occurrence
  relationships between genes. In this graph, nodes represent individual gene
  symbols. An edge (a connecting line) is drawn between two genes if they are
  both co-annotated with at least one common chemical compound in the reference
  database. This approach allows for the identification of annotation clusters —
  groups of genes that share compound annotation overlap in the dataset.

visual_elements:
  - label: "Nodes (Points)"
    description: >
      Each point represents a single Gene Symbol. The position is determined
      by a force-directed layout algorithm that groups connected genes together.

  - label: "Edges (Lines)"
    description: >
      A line connecting two genes indicates that they share at least one
      common compound annotation in the database. The width of the edge is
      proportional to the number of shared compound annotations.

  - label: "Node Color"
    description: >
      The color of a node represents its degree - the number of other genes
      it is connected to within this network. The color bar provides a
      quantitative scale, with brighter/warmer colors indicating "hub" genes
      that share annotation overlap with many other genes.

  - label: "Hover Information"
    description: >
      Hovering over a node displays the gene symbol and its connection count.
      Hovering over an edge shows the two connected genes and the number of
      shared compound annotations.

  - label: "Network Layout"
    description: >
      The spring layout algorithm positions nodes so that genes with greater
      annotation overlap are closer together, revealing cluster structures
      based on shared compound annotations.

interpretation_guidelines:
  - >
    Annotation Clusters: Dense clusters of interconnected nodes represent
    groups of genes that share broad compound annotation overlap in the dataset.
    These clusters may generate hypotheses about shared annotation contexts,
    but do not confirm that these genes are co-regulated or part of the same
    metabolic pathways.

  - >
    Hub Genes: Brightly colored nodes are highly connected within the annotation
    network, sharing compound annotations with many other genes. This reflects
    broad annotation coverage in the database and may serve as a starting point
    for further investigation, but does not confirm broad substrate specificity
    or regulatory centrality.

  - >
    Bridge Genes: A gene that connects two otherwise distinct annotation clusters
    shares compound annotations with both groups. This is an annotation-level
    observation and does not confirm that the gene links different metabolic
    pathways.

  - >
    Edge Weight: Thicker edges between genes indicate they share more compound
    annotations. This reflects the degree of annotation overlap and may generate
    hypotheses about shared annotation contexts, but does not confirm coordinated
    regulation or sequential enzymatic activity.

  - >
    Isolated Genes: Genes with few or no connections share little compound
    annotation overlap with other genes in the dataset. This may reflect
    narrow annotation coverage rather than unique substrate specificity.

color_scheme: "success"
