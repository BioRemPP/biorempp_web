# UC-5.3: Sample-Agency Annotation Co-occurrence
# Panel Configuration (YAML)

use_case_id: "uc-5-3"

scientific_question: >
  Which biological samples show the highest annotation co-occurrence with
  the compounds monitored by different environmental regulatory agencies?

description: >
  This visualization maps the annotation co-occurrence count between each
  biological sample and the various regulatory agencies represented in the
  dataset. The chord diagram provides an overview of these annotation-level
  relationships, where the connections illustrate the magnitude of co-occurrence
  counts between samples and agency compound lists.

visual_elements:
  - label: "Outer Arcs"
    description: >
      Each colored arc on the circumference represents either a Sample or a
      Regulatory Agency. The length of the arc is proportional to the total
      number of annotation links associated with it.

  - label: "Chords (Ribbons)"
    description: >
      The ribbons flowing between the arcs represent the annotation
      co-occurrences between a specific sample and a specific agency's
      compound list.

  - label: "Chord Thickness"
    description: >
      The thickness of a chord where it connects to an arc is proportional to
      the number of annotation co-occurrences. A thick chord indicates a higher
      count of shared annotations between a sample and an agency's compound list.

  - label: "Agency Dropdown Selector"
    description: >
      A dropdown control allows selecting a specific regulatory agency to focus
      the visualization. When selected, the diagram shows only annotation links
      involving the chosen agency.

  - label: "Node Colors"
    description: >
      Each category (sample or regulatory agency) is assigned a distinct color
      for easy identification across the diagram.

interpretation_guidelines:
  - >
    High Annotation Co-occurrence: A thick chord between a sample and an
    agency indicates that this sample has a high number of annotated gene-compound
    associations overlapping with that agency's compound list. This reflects
    annotation-level co-occurrence and does not confirm that the sample
    possesses confirmed functions for those compounds.

  - >
    Broad vs. Narrow Annotation Coverage: Samples with multiple thick chords
    connecting to various agencies show broader annotation overlap across
    regulatory contexts. Samples with one dominant chord show annotation
    concentration in a particular agency's compound list. These are
    annotation-level patterns and do not confirm regulatory compliance or
    functional versatility.

  - >
    Agency Annotation Footprint: A regulatory agency that receives many thick
    chords from different samples has a compound list that is broadly represented
    in the dataset's annotations. This reflects the scope of that agency's
    compound list relative to the dataset's annotation structure.

  - >
    Comparative Annotation Coverage: By comparing chord thickness across
    different sample-agency pairs, one can assess which samples show higher
    annotation overlap with specific agency compound lists. This comparison is
    exploratory and does not establish functional or regulatory relevance.

  - >
    Complementary Annotation Profiles: Samples that cover different agency
    compound lists in their annotations show complementary annotation profiles
    across regulatory contexts. Identifying such patterns can guide exploratory
    analyses, though any functional inference requires experimental validation.

color_scheme: "success"
