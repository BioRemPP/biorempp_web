# UC-6.5: Chemical-Enzymatic Annotation Landscape
# Panel Configuration (YAML)

use_case_id: "uc-6-5"

scientific_question: >
  For each class of chemical compounds, which enzyme activity annotations are
  most broadly represented, and which specific genes show the widest compound
  annotation coverage within each enzyme activity and class combination?

description: >
  This visualization provides a hierarchical, top-down view of the annotation
  distribution, starting from broad chemical classes. The treemap illustrates
  how these classes are associated with different enzyme activity annotations,
  which are in turn linked to specific genes. The size of each rectangle is
  proportional to the number of unique compound annotations, highlighting the
  enzyme activity annotations and genes with the broadest compound annotation
  coverage within each class. The nested rectangles represent the hierarchical
  path: Compound Class → Enzyme Activity → Gene Symbol.

visual_elements:
  - label: "Nested Rectangles (Hierarchy)"
    description: >
      The chart uses nested rectangles to represent the hierarchy. The largest
      rectangles represent the top-level categories (Compound Class), containing
      smaller rectangles for Enzyme Activity, which in turn contain the smallest
      rectangles for Gene Symbol.

  - label: "Area (Values)"
    description: >
      The area of each rectangle is proportional to the total unique compound
      annotation count for that category and all categories nested within it.
      Larger areas indicate broader compound annotation coverage within
      that category.

  - label: "Color Scale (Greens)"
    description: >
      The color of each rectangle corresponds to its unique compound annotation
      count, with darker/more intense greens indicating higher values. This
      provides immediate visual identification of categories with broader
      annotation coverage.

  - label: "Interactive Zoom"
    description: >
      Click on any rectangle to zoom in and explore that specific branch of
      the hierarchy in more detail. Click the header bar to zoom out and
      return to the previous level.

  - label: "Hover Information"
    description: >
      Hovering over each rectangle displays the category name and its exact
      unique compound annotation count value.

interpretation_guidelines:
  - >
    Broadly Annotated Chemical Classes: The largest rectangles at the top
    level represent compound classes with the most compound annotations
    co-occurring with diverse enzyme activity annotations in the dataset.
    This reflects annotation coverage and may guide further exploration, but
    does not confirm that these classes have broader enzymatic support in vivo.

  - >
    Enzyme Activity Annotation Distribution: Within a given compound class,
    the largest Enzyme Activity rectangles show which enzyme activity
    annotations have the most compound annotation overlap with that class.
    This is an annotation-level observation and does not confirm which enzymatic
    functions are most commonly used to process those compounds.

  - >
    Gene Annotation Breadth: At the lowest level, the largest Gene Symbol
    rectangles represent genes with the broadest compound annotation coverage
    within each enzyme activity and class combination. This reflects annotation
    breadth in the database and does not confirm in vivo substrate range or
    functional priority.

  - >
    Cross-Class Annotation Patterns: Genes that appear prominently across
    multiple compound classes in the dataset show broad annotation overlap.
    Identifying such patterns can serve as a starting point for exploratory
    analyses, though any functional inference requires experimental validation
    beyond annotation data.

  - >
    Hierarchical Annotation Structure: The overall structure can help identify
    how compound annotation counts are distributed across chemical classes and
    enzyme activity annotations, guiding exploratory analyses of annotation
    coverage patterns in the dataset.

color_scheme: "success"
