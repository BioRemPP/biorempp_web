# UC-1.4: Proportional Functional Diversity of Biological Samples
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-1-4"

scientific_question: >
  What is the relative KO annotation breadth of each biological sample
  compared to the total unique KO pool observed across the entire dataset?

description: >
  This visualization provides a high-level overview of the KO annotation
  distribution by breaking down the complete set of unique KEGG Orthology (KO)
  identifiers by sample. The 100% stacked bar chart illustrates the proportional
  representation of each sample in the total pool of unique KOs identified.
  The primary entities compared are the biological samples, showing their
  relative KO annotation coverage within the dataset.

visual_elements:
  - label: "Single Stacked Bar"
    description: >
      The chart consists of a single vertical bar that represents the entirety
      (100%) of the unique KOs found in the dataset. This single-bar format
      emphasizes the proportional breakdown rather than absolute counts,
      allowing for immediate visual comparison of relative KO annotation contributions.
  
  - label: "Colored Segments"
    description: >
      Each colored segment within the bar corresponds to a specific biological
      sample. Different colors help distinguish between samples and make it easy
      to identify which biological sources contribute the greatest share of
      unique KOs to the total annotation pool.
  
  - label: "Segment Length and Percentage Labels"
    description: >
      The length of each segment, along with its percentage label (e.g., "23.4%"),
      indicates that sample's proportional share of the total unique KO pool.
      Larger segments represent samples contributing a greater number of unique
      KOs to the dataset. The percentages sum to exactly 100%.
  
  - label: "Hover Information"
    description: >
      Hovering over any segment reveals detailed information including the
      sample name, the exact count of unique KOs associated with that sample,
      and the percentage share. This provides precise quantification while
      maintaining the visual clarity of the proportional view.
  
  - label: "Legend"
    description: >
      The legend on the right side lists all samples with their corresponding
      colors. This allows quick identification of which segment represents which
      biological source without needing to hover over each segment.

interpretation_guidelines:
  - >
    Functional Representation: Larger segments correspond to biological samples
    with a greater proportion of the total unique KO diversity in the dataset.
    This reflects annotation breadth within the current dataset and may serve
    as a basis for comparing relative functional representation across samples.

  - >
    Comparative Diversity: The chart allows a rapid comparison of the proportional
    functional contribution of each sample. Samples with markedly larger segments
    contribute more unique KOs to the total pool, which may reflect broader
    annotation coverage or more diverse metabolic gene content in the source data.

  - >
    Narrow Representation: Samples with smaller segments contribute fewer unique
    KOs proportionally. This may reflect a more restricted annotation profile,
    smaller dataset size, or a more focused metabolic repertoire — and should not
    be interpreted as lower biological relevance without additional context.

  - >
    Distribution Pattern: The spread of segment sizes reveals whether functional
    diversity is broadly distributed across samples or concentrated in a few.
    Uneven distributions may reflect dataset composition differences worth
    considering when interpreting downstream analyses.

  - >
    Exploratory Starting Point: Samples with larger proportional contributions
    may be useful starting points for functional annotation exploration. However,
    proportional KO representation is one of several factors relevant to functional
    characterization; absolute counts, pathway context, and sample metadata should
    also be considered.

color_scheme: "primary"
