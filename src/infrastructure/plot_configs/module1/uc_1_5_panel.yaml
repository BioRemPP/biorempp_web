# UC-1.5: Regulatory Reference Compliance Scorecard

use_case_id: "uc-1-5"

scientific_question: >
  To what extent does the annotated KO repertoire of each biological sample
  overlap with the compound lists of different regulatory agencies, as measured
  by the percentage of monitored compounds associated with KOs present in
  each sample's annotation?

description: >
  This visualization quantifies the annotation-level overlap between each
  biological sample and major regulatory agency compound lists. The heatmap
  displays a calculated Overlap Score, which represents the percentage of an
  agency's listed compounds that are associated with KOs present in a sample's
  annotation. The matrix compares Samples (rows) against Regulatory Agencies
  (columns), with cell values representing the overlap score (0-100%).

visual_elements:
  - label: "Heatmap Matrix"
    description: >
      The visualization is structured as a matrix where rows represent individual
      biological samples and columns represent different regulatory agencies
      (e.g., EPA, EPC, ATSDR). Each cell displays an annotation overlap score
      as both color intensity and numerical value, enabling comparison of
      KO-compound co-occurrence across samples and regulatory contexts.
  
  - label: "Color Gradient (Blue Scale)"
    description: >
      Cell colors range from light blue (low overlap, 0-20%) through medium blue
      (moderate overlap, 40-60%) to dark blue (high overlap, 80-100%). The color
      intensity provides an immediate visual indicator of annotation overlap between
      a sample's KO repertoire and each agency's compound list. Darker cells
      highlight sample-agency combinations with the highest functional co-occurrence
      in the dataset.
  
  - label: "Compliance Score Labels"
    description: >
      Each cell displays the score (e.g., "95.0%") directly within the cell.
      A score of 100% indicates that all compounds monitored by that agency are
      associated with KOs present in the sample's annotation. Higher scores
      reflect greater annotation overlap; they do not imply operational readiness
      or confirmed degradation activity.
  
  - label: "Sample Rows (Y-axis)"
    description: >
      Each row represents a biological sample and shows its annotation overlap
      scores across all regulatory agencies. Reading across a row allows comparison
      of a sample's functional overlap with different agency compound lists, and
      can help identify whether a sample shows broad or more context-specific
      functional representation.
  
  - label: "Regulatory Agency Columns (X-axis)"
    description: >
      Each column represents a regulatory agency (e.g., EPA, EPC, ATSDR) and
      shows annotation overlap scores across all samples. Reading down a column
      reveals which samples have the greatest KO overlap with that agency's
      compound list, providing a comparative view of functional representation
      within the dataset for that regulatory context.

interpretation_guidelines:
  - >
    High-Score Intersections: Cells with high scores (dark blue) indicate samples
    whose annotated KO repertoire overlaps substantially with compounds listed by
    that regulatory agency. This reflects annotation-level co-occurrence and may
    suggest functional relevance worth investigating, but does not confirm actual
    degradation capability or regulatory compliance in any operational sense.

  - >
    Broad Functional Profiles: Samples with consistently elevated scores across
    multiple agency columns show broad overlap between their annotated functional
    potential and compound lists from several frameworks. This pattern may indicate
    functional generalism and can help prioritize samples for further multi-context
    investigation.

  - >
    Complementary Coverage: Comparing score profiles across samples can reveal
    complementary patterns — samples with higher scores in different agency columns
    may together cover a broader functional space. This observation may generate
    hypotheses about multi-sample analysis strategies, though any consortium design
    requires experimental validation beyond annotation data.

  - >
    Exploratory Sample Selection: The heatmap can help orient the selection of
    samples for further investigation within a specific regulatory context. Samples
    with higher scores for a given agency have greater annotation overlap with that
    agency's compound list, which may inform, but should not alone determine,
    prioritization in research workflows.

  - >
    Low-Score Areas: Cells with low scores indicate limited overlap between a
    sample's annotated KOs and an agency's compound-associated functions. These
    areas may guide hypothesis generation about functional gaps and serve as a
    starting point for identifying which compounds or pathways are
    underrepresented for a given sample.

color_scheme: "primary"
