# UC-1.6: Sample-Agency Functional Potential Heatmap
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-1-6"

scientific_question: >
  To what extent does the KO annotation breadth of different samples overlap
  with the compound lists of various environmental regulatory agencies,
  as measured by unique KO counts at each sample-agency intersection?

description: >
  This heatmap visualizes the distribution of KO annotation coverage across
  biological samples within different regulatory contexts. It quantifies the
  number of unique KEGG Orthology (KO) identifiers at the intersection of
  each sample and reference agency, providing a matrix of annotation co-occurrence
  counts per sample-agency combination.

visual_elements:
  - label: "Y-Axis (Reference Agencies)"
    description: >
      Represents the different Reference Agencies (e.g., WFD, CONAMA, EPA).
      Each row corresponds to a distinct regulatory framework with its own
      set of monitored compounds and environmental priorities.

  - label: "X-Axis (Samples)"
    description: >
      Represents the individual biological samples in the dataset. Each column
      corresponds to a unique sample with its own annotated gene repertoire.

  - label: "Cell Color and Values"
    description: >
      The color intensity of each cell (and the number within it) indicates
      the count of unique KOs found for that specific Sample-Agency combination.
      The color bar on the right provides the quantitative scale. Darker/brighter
      colors indicate higher KO co-occurrence counts for that sample-agency pair.

  - label: "Color Bar"
    description: >
      Located on the right side of the heatmap, it provides a quantitative
      reference for interpreting cell colors. Values range from the minimum
      to the maximum unique KO count across all Sample-Agency combinations.

interpretation_guidelines:
  - >
    Functional Hotspots: Brightly colored cells indicate a higher count of unique
    KOs at the intersection of a sample and a regulatory agency context. This
    suggests greater annotation overlap and may indicate functional relevance
    worth exploring; it does not confirm degradation capability without
    experimental evidence.

  - >
    Agency-Level Patterns: Rows with consistently high values may indicate that
    an agency's target compounds are associated with broadly distributed metabolic
    functions across samples. This pattern may reflect the commonality of pathways
    involved in processing those compounds within the annotated dataset.

  - >
    Sample-Level Profiles: Columns with consistently high values may suggest a
    sample with broad annotated functional representation across multiple regulatory
    contexts. Columns with elevated values in only a few rows may indicate more
    context-specific functional annotation coverage.

  - >
    Coverage Gaps: Comparing values across rows can help identify regulatory
    frameworks that are less well-represented in the sample collection, which
    may highlight annotation gaps or areas for further functional characterization.

  - >
    Complementary Patterns: Samples with different hotspot distributions may
    cover distinct functional spaces across regulatory contexts. Identifying such
    complementary profiles can generate hypotheses about multi-sample functional
    coverage, to be examined with further analysis.

color_scheme: "primary"
