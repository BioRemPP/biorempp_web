# UC-1.2: Overlap of Compounds Across Regulatory References
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-1-2"

scientific_question: >
  To what extent do the lists of monitored chemical compounds overlap between
  different environmental regulatory agencies, and which compounds appear in
  multiple regulatory lists?

description: >
  This interactive UpSet visualization quantifies the overlap and uniqueness
  of compound names across different regulatory agencies (referenceAG) cited
  in the BioRemPP dataset. The plot shows which compounds appear exclusively
  in one agency's list versus those present in multiple lists, allowing
  exploration of overlap and divergence patterns across regulatory frameworks.

visual_elements:
  - label: "Set Size (Left Bar Chart)"
    description: >
      Shows the total number of unique compounds associated with each individual
      regulatory agency (e.g., WFD, CONAMA, EPC). Taller bars indicate broader
      monitoring scope from that regulatory body. Compare these values to
      understand the overall coverage of each agency's compound list.
  
  - label: "Intersection Matrix (Bottom)"
    description: >
      The connected dots define specific intersections between regulatory agencies.
      For example, dots connected for "EPC" and "WFD" represent the set of
      compounds monitored by both agencies. Single dots represent agency-exclusive
      compounds, while multiple connected dots represent compounds present in
      several regulatory lists simultaneously.
  
  - label: "Intersection Size (Top Bar Chart)"
    description: >
      The height of each bar corresponds to the number of compounds in the
      intersection defined by the matrix directly below it. Taller bars indicate
      a larger number of shared compounds. The tallest bar can help identify the
      most common pattern of regulatory agreement or divergence.
  
  - label: "Hover Information"
    description: >
      Hovering over any bar reveals the exact count of compounds in that
      intersection, along with the specific regulatory agencies involved. This
      allows precise quantification of overlaps and unique regulatory focuses.

interpretation_guidelines:
  - >
    Shared Regulatory Focus: A large bar above an intersection of multiple agencies
    represents compounds monitored by more than one regulatory body. Presence in
    multiple lists may reflect broader regulatory recognition, though inclusion
    criteria and risk frameworks vary across jurisdictions and should be consulted
    directly for context.

  - >
    Agency-Specific Focus: Bars above single, unconnected dots represent
    compounds unique to one agency's list. These highlight the specialized
    scope of that regulatory body — such as region-specific pollutants or
    particular chemical classes — that may not appear in other frameworks.

  - >
    Harmonization Patterns: The size and distribution of overlaps can indicate
    the degree of alignment between regulatory frameworks. Large overlaps may
    suggest coordinated monitoring approaches, while limited overlaps may reflect
    different regional priorities, risk assessment methodologies, or stages of
    regulatory development.

  - >
    Coverage Comparison: Comparing the heights of agency-specific and shared-
    compound bars provides a view of whether monitoring scope is predominantly
    distinct or overlapping across agencies, contextualizing the breadth and
    uniqueness of each framework's coverage within this dataset.

  - >
    Exploratory Prioritization: Compounds present in multiple regulatory lists
    can serve as a starting point for exploring their representation in the dataset.
    Compounds unique to a single agency may reflect region-specific or emerging
    concerns and may warrant further investigation of their regulatory context
    and environmental relevance.

color_scheme: "primary"
