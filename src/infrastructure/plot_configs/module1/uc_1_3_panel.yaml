# UC-1.3: Proportional Contribution of References
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-1-3"

scientific_question: >
  What is the proportional representation of each regulatory agency's associated
  KO annotations within the total unique KO diversity observed across the
  entire dataset?

description: >
  This visualization provides a high-level overview of the KO annotation
  distribution by breaking down the complete set of unique KEGG Orthology (KO)
  identifiers by the regulatory context in which they appear. The 100% stacked
  bar chart illustrates the proportional representation of each reference agency
  in the total pool of unique KOs identified. The primary entities compared are
  the regulatory or scientific agencies (e.g., WFD, CONAMA, EPC) that define
  the regulatory context associated with each compound in the dataset.

visual_elements:
  - label: "Single Stacked Bar"
    description: >
      The chart consists of a single vertical bar that represents the entirety
      (100%) of the unique KOs found in the dataset. This single-bar format
      emphasizes the proportional breakdown rather than absolute counts,
      allowing for immediate visual comparison of relative contributions.
  
  - label: "Colored Segments"
    description: >
      Each colored segment within the bar corresponds to a specific Reference
      Agency (e.g., WFD, CONAMA, EPC). Different colors help distinguish between
      agencies and make it easy to identify which regulatory contexts are
      associated with the greatest KO annotation diversity in the dataset.
  
  - label: "Segment Length and Percentage Labels"
    description: >
      The length of each segment, along with its percentage label (e.g., "30.5%"),
      indicates that agency's proportional share of the total unique KO pool.
      Larger segments represent agencies whose associated compounds overlap with
      a greater number of unique KOs in the dataset. The percentages sum to
      exactly 100%.
  
  - label: "Hover Information"
    description: >
      Hovering over any segment reveals detailed information including the
      Reference Agency name, the exact count of unique KOs associated with that
      agency, and the percentage share. This provides precise quantification
      while maintaining the visual clarity of the proportional view.
  
  - label: "Legend"
    description: >
      The legend on the right side lists all Reference Agencies with their
      corresponding colors. This allows quick identification of which segment
      represents which regulatory context without needing to hover over each
      segment.

interpretation_guidelines:
  - >
    Dominant Contributions: Larger segments indicate that the associated
    regulatory agency's compound list overlaps with a greater proportion of
    the KO diversity in this dataset. This reflects annotation coverage within
    BioRemPP and does not necessarily indicate broader environmental relevance
    or the comprehensiveness of the regulatory framework itself.

  - >
    Specialized Scope: Smaller segments may reflect agencies with a more
    targeted compound list, whose regulated substances are associated with a
    narrower set of metabolic functions in the dataset. This may stem from a
    more restricted compound list or lower KO annotation density for those
    compounds.

  - >
    Proportional Overview: The chart provides a rapid comparative view of each
    regulatory context's relative representation in the functional space of the
    dataset. This can help orient exploration of which regulatory frameworks are
    more or less represented in the annotation data.

  - >
    Distribution Pattern: Examining the spread of percentages reveals whether
    functional diversity is broadly distributed across regulatory contexts or
    concentrated in a few agencies. This reflects the structure of the dataset
    and may guide decisions about which regulatory contexts to explore further.

  - >
    Contextualizing Coverage: Proportional representation in this chart is a
    function of KO annotation overlap with each agency's compound list in BioRemPP.
    Agencies with larger shares represent richer annotation intersections in the
    current dataset and may serve as starting points for regulatory-contextualized
    functional exploration.

color_scheme: "primary"
