# UC-1.1: Database Overlap and Unique Contributions Analysis
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-1-1"

scientific_question: >
  To what extent do the functional annotations from different databases agree,
  and what unique contributions does each source provide for bioremediation-
  focused analysis?

description: >
  This interactive UpSet visualization quantifies the overlap and uniqueness
  of KEGG Orthology (KO) identifiers across three distinct annotation sources:
  BioRemPP, HADEG, and KEGG. The plot reveals consensus evidence, database-
  specific coverage, and partial agreements between annotation sources, enabling
  assessment of their complementary contributions to functional annotation analysis.

visual_elements:
  - label: "Set Size (Left Bar Chart)"
    description: >
      Shows the total number of unique KOs found in each individual database.
      Taller bars indicate a greater number of KOs in that annotation source.
      Compare these values to understand the overall KO coverage of each
      database.
  
  - label: "Intersection Matrix (Bottom)"
    description: >
      The connected dots define specific intersections between databases. For
      example, dots connected for BioRemPP and KEGG (but not HADEG) represent
      the set of KOs found only in those two databases. Single dots represent
      database-exclusive KOs, while three connected dots represent consensus
      across all sources.
  
  - label: "Intersection Size (Top Bar Chart)"
    description: >
      The height of each bar corresponds to the number of KOs in the intersection
      defined by the matrix directly below it. Taller bars indicate larger
      numbers of shared KOs. The tallest bar identifies the most frequent
      intersection pattern among databases.
  
  - label: "Hover Information"
    description: >
      Hovering over any bar reveals the exact count of KOs in that intersection,
      along with the specific databases involved. This allows precise quantification
      of overlaps and unique contributions.

interpretation_guidelines:
  - >
    Consensus Evidence: A large bar above the triple intersection (all three
    dots connected) indicates KOs recognized across all three sources. This
    convergence may reflect greater annotation agreement and can serve as a
    starting point for hypothesis generation, though database co-occurrence
    does not itself confirm biological function.

  - >
    Database-Specific Coverage: Bars above single, unconnected dots represent
    KOs unique to one database. These highlight the specialized scope of each
    source, such as HADEG's focus on hydrocarbon biotransformation pathways or
    BioRemPP's compound-centric functional links, and may indicate areas where
    additional cross-referencing is warranted.

  - >
    Partial Agreement: Bars above pairwise intersections reflect partial overlap
    between sources. These patterns may reveal differences in curation strategy,
    annotation scope, or update frequency across databases, and are worth
    examining when selecting a reference framework for analysis.

  - >
    Complementarity Assessment: Comparing database-specific bars with consensus
    bars can help characterize whether the databases provide complementary or
    redundant annotation coverage. This can inform decisions about which sources
    to integrate in a given analysis context.

  - >
    Cross-Reference Opportunity: KOs appearing in multiple databases allow
    cross-referencing of annotations across sources. KOs unique to a single
    database may warrant additional scrutiny before use in downstream analyses.

color_scheme: "primary"
