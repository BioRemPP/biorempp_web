# UC-3.1: PCA - Sample Relationships by KO Profile
# Panel Configuration (YAML)

use_case_id: "uc-3-1"

scientific_question: >
  How do biological samples cluster based on the similarity of their
  KEGG Orthology (KO) annotation profiles? Which samples show similar
  KO composition, and which present distinct annotation patterns?

description: >
  This visualization employs Principal Component Analysis (PCA) to reduce the
  high-dimensional space of KO presence/absence profiles into two principal
  components for visualization. Each point represents a sample, positioned
  according to its scores on PC1 and PC2. The analysis can help identify natural
  groupings, outliers, and the overall structure of functional diversity
  within the dataset. Samples with similar KO repertoires cluster together,
  while functionally distinct samples appear farther apart.

visual_elements:
  - label: "X-axis (PC1)"
    description: >
      Principal Component 1 captures the largest variance in the KO profiles.
      The axis label shows the percentage of total variance explained by PC1.
      Samples spread along this axis differ most strongly in the features
      that contribute to PC1.

  - label: "Y-axis (PC2)"
    description: >
      Principal Component 2 captures the second-largest variance orthogonal
      to PC1. The axis label shows the percentage of variance explained by PC2.
      Together, PC1 and PC2 provide a 2D projection that preserves major
      patterns of sample relationships.

  - label: "Points (Samples)"
    description: >
      Each point represents one biological sample. Points are colored by
      sample identity, making it easy to track individual samples and
      identify clusters.

  - label: "Point Color"
    description: >
      Colors distinguish individual samples. Samples of the same color are
      the same biological source. The color legend on the right shows all
      samples included in the analysis.

  - label: "Clustering"
    description: >
      Samples that appear close together in the plot have similar KO annotation
      profiles. Distinct clusters may suggest different KO annotation patterns
      across biological sources within the dataset.

  - label: "Hover Information"
    description: >
      Hovering over each point displays the sample name and its PC1/PC2 scores,
      facilitating identification and comparison.

interpretation_guidelines:
  - >
    KO Profile Clusters: Tight groups of samples indicate similar KO annotation
    profiles. These clusters may reflect shared annotation patterns across
    biological sources and can generate hypotheses about shared ecological or
    functional contexts, though KO co-occurrence does not confirm shared function.

  - >
    Outliers: Samples positioned far from others have KO annotation profiles
    that differ substantially from the rest. These may warrant further
    investigation to understand what annotation features drive their separation.

  - >
    Variance Explained: The percentages on the axes indicate how much of the
    total KO profile variance is captured by the 2D projection. Higher combined
    values suggest the 2D plot preserves more of the original variation; lower
    values indicate that relevant structure may remain in dimensions not shown.

  - >
    Gradient Patterns: If samples form a gradient rather than discrete clusters,
    this may suggest a continuum of KO annotation variation rather than distinct
    groupings in the dataset.

  - >
    Spread of Points: The overall spread of points reflects KO annotation
    diversity across samples. Tightly packed samples share more similar
    annotation profiles, while widely dispersed samples show greater annotation
    heterogeneity.

  - >
    Complementary Annotation Profiles: Samples that cluster separately have
    more distinct KO annotation profiles. This observation may serve as a
    starting point for exploring annotation complementarity, though any
    functional inference requires experimental validation.

color_scheme: "primary"
