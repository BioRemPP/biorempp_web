# UC-3.4: Sample Similarity Based on KO Profiles
# Panel Configuration (YAML)

use_case_id: "uc-3-4"

scientific_question: >
  How similar are the biological samples to one another, based on the
  overlap of their KEGG Orthology (KO) annotation profiles?

description: >
  This visualization assesses the pairwise similarity between all biological
  samples based on their shared KO annotation profiles. The correlogram
  (a heatmap of a correlation matrix) is constructed from a presence/absence
  matrix of KO identifiers per sample, providing a quantitative measure of
  how similar the KO annotation profiles of any two samples are. Pearson
  correlation coefficients are computed between samples.

visual_elements:
  - label: "X-axis and Y-axis"
    description: >
      Both axes represent the individual Samples. Each cell in the matrix
      corresponds to a pairwise comparison between two samples.

  - label: "Cell Color"
    description: >
      The color of the cell at the intersection of two samples indicates the
      Pearson correlation coefficient between their KO profiles.

  - label: "Color Scale"
    description: >
      The plot uses a diverging color scale (RdBu_r). Warm colors (reds) signify
      a high positive correlation (high similarity), indicating that two samples
      share a very similar set of KOs. Cool colors (blues) indicate a negative
      correlation (dissimilar profiles). Values range from -1 to +1.

  - label: "Diagonal"
    description: >
      The central diagonal is always bright red, as each sample is perfectly
      correlated with itself (r = 1.0).

  - label: "Hover Information"
    description: >
      Hovering over each cell displays the two sample names being compared
      and their exact correlation coefficient value.

interpretation_guidelines:
  - >
    KO Profile Clusters: Brightly colored squares or blocks off the main
    diagonal identify clusters of samples with highly similar KO annotation
    profiles. These groupings may reflect shared annotation patterns and can
    generate hypotheses about ecological or functional relationships, but do
    not confirm shared metabolic activity.

  - >
    Distinct Groups: The overall structure of the heatmap may help identify
    distinct KO annotation groups within the dataset. Samples forming a tight,
    warm-colored cluster share more similar KO profiles than samples in
    cooler-colored regions of the plot.

  - >
    Unique Annotation Profiles: A sample that shows low correlation (neutral
    or cool colors) with most other samples has a KO annotation profile that
    differs substantially from the rest of the dataset, which may warrant
    further investigation.

  - >
    Annotation Overlap: High overall correlation across many samples indicates
    broadly similar KO annotation profiles. This may reflect shared annotation
    sources, similar biological contexts, or simply shared KO content in the
    reference databases used.

  - >
    Complementary Profiles: Identifying samples with low correlation can help
    explore annotation complementarity. Any inference about functional
    collaboration or consortium design based on KO overlap requires experimental
    validation beyond annotation data.

color_scheme: "primary"
