# UC-3.7: Compound Co-occurrence Patterns Across Samples
# Panel Configuration (YAML)

use_case_id: "uc-3-7"

scientific_question: >
  Which chemical compounds tend to co-occur across the biological samples,
  and what hypotheses might this co-occurrence pattern suggest about shared
  annotation contexts, metabolic associations, or compound co-presence?

description: >
  This visualization explores the pairwise co-occurrence relationships
  between all identified compound names. The correlogram is constructed
  based on how frequently any two compounds are found within the same sample
  across the entire dataset, providing a map of potential chemical or
  metabolic linkages.

visual_elements:
  - label: "X-axis and Y-axis"
    description: >
      Both axes represent the unique Compound Names found in the dataset.
      Each cell in the matrix corresponds to a pairwise comparison
      between two compounds.

  - label: "Cell Color"
    description: >
      The color of the cell at the intersection of two compounds indicates
      the correlation coefficient between their presence profiles
      across all samples.

  - label: "Color Scale"
    description: >
      The plot uses a diverging color scale (RdBu_r). Warm colors (reds)
      signify a high positive correlation (high co-occurrence), indicating
      that two compounds are frequently found together. Cool colors (blues)
      would indicate negative correlation (mutually exclusive patterns).
      Values range from -1 to +1.

  - label: "Diagonal"
    description: >
      The central diagonal is always bright red, as each compound is perfectly
      correlated with itself (r = 1.0).

  - label: "Hover Information"
    description: >
      Hovering over each cell displays the two compound names being compared
      and their exact correlation coefficient value.

interpretation_guidelines:
  - >
    Co-occurrence Clusters: Brightly colored squares or blocks off the main
    diagonal identify clusters of compounds that frequently co-occur across
    samples. These patterns may generate hypotheses about shared annotation
    contexts — such as potential pathway associations or compound co-presence —
    but do not establish causal or mechanistic relationships from co-occurrence
    alone.

  - >
    Potential Pathway Associations: Compounds with strong positive correlations
    tend to appear together in the same samples. This pattern is consistent with,
    but does not confirm, shared pathway annotation. It may serve as a
    hypothesis-generating signal for further pathway-level investigation.

  - >
    Co-annotation Patterns: Pollutants frequently found together across samples
    may reflect shared environmental origin or annotation co-occurrence in the
    dataset. These patterns are observational and should be interpreted with
    reference to the underlying annotation sources.

  - >
    Shared Gene Annotations: Compounds that share similar co-occurrence profiles
    may be associated with overlapping gene annotations in the dataset. This
    is an annotation-level observation and does not confirm shared enzymatic
    processing.

  - >
    Distinct Compound Groups: The overall structure may help identify groups of
    compounds with similar co-occurrence profiles across samples, which can
    guide exploratory analyses of compound class coverage and annotation
    patterns within the dataset.

color_scheme: "success"
