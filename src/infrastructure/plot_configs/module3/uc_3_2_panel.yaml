# UC-3.2: PCA - Sample Relationships by Compound Profile
# Panel Configuration (YAML)

use_case_id: "uc-3-2"

scientific_question: >
  How do biological samples cluster based on the similarity of their compound
  annotation profiles? Which samples show similar compound association patterns,
  and which present distinct compound coverage across chemical classes?

description: >
  This visualization employs Principal Component Analysis (PCA) to reduce the
  high-dimensional space of compound presence/absence profiles into two principal
  components for visualization. Each point represents a sample, positioned
  according to its scores on PC1 and PC2. The analysis can help identify natural
  groupings based on compound annotation profiles, outliers, and the overall
  structure of compound coverage within the dataset. Samples with similar
  compound annotation profiles cluster together, while samples with distinct
  profiles appear farther apart.

visual_elements:
  - label: "X-axis (PC1)"
    description: >
      Principal Component 1 captures the largest variance in the compound
      annotation profiles. The axis label shows the percentage of total
      variance explained by PC1. Samples spread along this axis differ most
      strongly in the compound classes present in their annotation profiles.

  - label: "Y-axis (PC2)"
    description: >
      Principal Component 2 captures the second-largest variance orthogonal
      to PC1. The axis label shows the percentage of variance explained by PC2.
      Together, PC1 and PC2 provide a 2D projection that preserves major
      patterns of compound annotation profile variation.

  - label: "Points (Samples)"
    description: >
      Each point represents one biological sample. Points are colored by
      sample identity, making it easy to track individual samples and
      identify clusters based on interaction profiles.

  - label: "Point Color"
    description: >
      Colors distinguish individual samples. Samples of the same color are
      the same biological source. The color legend on the right shows all
      samples included in the analysis.

  - label: "Clustering"
    description: >
      Samples that appear close together in the plot have similar compound
      annotation profiles. Distinct clusters may suggest different compound
      association patterns across chemical classes (e.g., aromatics, aliphatics,
      heterocycles), which can generate hypotheses for further investigation.

  - label: "Hover Information"
    description: >
      Hovering over each point displays the sample name and its PC1/PC2 scores,
      facilitating identification and comparison of annotation profile positions.

interpretation_guidelines:
  - >
    Compound Profile Clusters: Tight groups of samples indicate similar compound
    annotation profiles. These clusters may reflect shared compound coverage
    patterns across samples and can serve as a starting point for hypothesis
    generation, but do not confirm shared biotransformation activity without
    experimental evidence.

  - >
    Broad vs. Narrow Compound Profiles: Samples near the center of the plot
    tend to have compound annotation profiles that overlap broadly with others.
    Samples at the periphery show more distinct profiles, which may reflect
    narrower or more specialized compound coverage in their annotations.

  - >
    Complementary Annotation Profiles: Samples positioned far apart in the plot
    have divergent compound annotation profiles. Identifying such complementary
    patterns may generate hypotheses about functional coverage, to be examined
    with further experimental analysis.

  - >
    Variance Explained: The percentages on the axes indicate how much of the
    total compound profile variance is captured by the 2D projection. Higher
    combined values suggest the plot preserves more of the original structure;
    lower values indicate additional variance not visualized in 2D.

  - >
    Profile Spread: The overall dispersion of points reflects annotation
    diversity across samples. Wide dispersion suggests heterogeneous compound
    annotation profiles; tighter clustering suggests more uniform coverage.

  - >
    Outliers: Samples far from others have compound annotation profiles that
    differ substantially from the rest. These may warrant further investigation
    to understand which compound classes or annotation sources drive the separation.

  - >
    Annotation Coverage Patterns: Samples from distinct clusters show different
    compound annotation patterns. Exploring these differences can help identify
    which compound classes are more or less represented across different samples.

color_scheme: "primary"
