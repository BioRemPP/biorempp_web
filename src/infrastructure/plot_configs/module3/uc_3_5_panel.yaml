# UC-3.5: Sample Similarity Based on Chemical Profiles
# Panel Configuration (YAML)

use_case_id: "uc-3-5"

scientific_question: >
  How similar are the biological samples to one another, based on their
  shared compound annotation profiles?

description: >
  This visualization assesses the pairwise similarity between all biological
  samples based on their shared compound annotation profiles. The correlogram
  is constructed from a correlation matrix where the similarity between any
  two samples is quantified by the compounds they share in their annotations.
  This helps to identify biological sources with similar compound coverage
  patterns within the dataset.

visual_elements:
  - label: "X-axis and Y-axis"
    description: >
      Both axes represent the individual Samples (biological samples under
      investigation). Each cell in the matrix corresponds to a pairwise
      comparison between two samples.

  - label: "Cell Color"
    description: >
      The color of the cell at the intersection of two samples indicates
      the correlation coefficient between their compound profiles.

  - label: "Color Scale"
    description: >
      The plot uses a diverging color scale (RdBu_r). Warm colors (reds)
      signify a high positive correlation (high similarity), indicating
      that two samples interact with a very similar set of compounds.
      Cool colors (blues) indicate negative correlation (dissimilar profiles).
      Values range from -1 to +1.

  - label: "Diagonal"
    description: >
      The central diagonal is always bright red, as each sample is perfectly
      correlated with itself (r = 1.0).

  - label: "Hover Information"
    description: >
      Hovering over each cell displays the two sample names being compared
      and their exact correlation coefficient value.

interpretation_guidelines:
  - >
    Compound Profile Clusters: Brightly colored squares or blocks off the
    main diagonal identify clusters of samples with highly similar compound
    annotation profiles. These groupings reflect shared annotation patterns
    and may generate hypotheses about shared compound coverage, but do not
    confirm ecological interactions or shared biotransformation activity.

  - >
    Distinct Compound Coverage Patterns: The overall structure of the heatmap
    may help identify distinct groups of samples with different compound
    annotation profiles, reflecting different compound coverage across
    chemical classes in the dataset.

  - >
    Unique Annotation Profiles: A sample that shows low correlation (neutral
    or cool colors) with most other samples has a compound annotation profile
    that differs substantially from the rest, which may be worth investigating
    further.

  - >
    Complementary Profiles: Identifying samples with low correlation reveals
    samples with divergent compound annotation coverage. This may serve as a
    starting point for exploring annotation complementarity, though any
    functional inference requires experimental validation beyond annotation data.

  - >
    Annotation Overlap: Samples with high compound profile correlation share
    similar compound annotation coverage. This may reflect shared annotation
    sources or similar compound class composition, and should be interpreted
    in the context of the dataset's annotation structure.

color_scheme: "primary"
