# UC-8.6: KO Annotation Overlap Across Samples for a Selected Pathway
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-8-6"

scientific_question: >
  For a specific metabolic pathway, how are the annotated KOs distributed
  across different biological samples, and what do their overlap patterns
  reveal about shared and unique KO annotations?

description: >
  This interactive visualization maps the distribution of KO annotations for
  a specific metabolic pathway across the different samples. By selecting a
  target pathway from the dropdown menu, the UpSet plot is dynamically generated
  to display how the set of KO identifiers annotated for that pathway is
  distributed across the different samples. The plot reveals patterns of shared
  KO annotations (multiple samples with the same KOs) and unique KO annotations
  (samples contributing KOs not present in others), enabling exploratory analysis
  of annotation overlap and distinctiveness per pathway.

visual_elements:
  - label: "Dropdown Menu"
    description: >
      Use this to select the target pathway to analyze. The plot will update
      automatically to show how KO annotations for the selected pathway are
      distributed across all available samples.

  - label: "Set Size (Left Bar Chart)"
    description: >
      Shows the total number of unique KO annotations for the selected pathway
      that are present in each individual sample. Taller bars indicate that a
      sample has more KO annotations for that pathway. Compare these values to
      identify samples with broader annotation coverage for the pathway.

  - label: "Intersection Matrix (Bottom)"
    description: >
      The connected dots define a specific intersection, representing a subset
      of KO annotations shared by the indicated samples. Single dots represent
      KOs annotated only in that sample, while multiple connected dots represent
      KO annotations shared across several samples.

  - label: "Intersection Size (Top Bar Chart)"
    description: >
      The height of each bar corresponds to the number of KO annotations in the
      intersection defined by the matrix directly below it. Taller bars indicate
      a larger number of shared KO annotations. The tallest bar reveals the most
      common pattern of annotation overlap or uniqueness across samples.

interpretation_guidelines:
  - >
    Shared KO Annotations: Large bars over intersections of multiple samples
    indicate KOs annotated in common across those samples for the selected pathway.
    This reflects annotation overlap in the database and does not confirm that
    those samples execute the same pathway steps. Whether shared annotation implies
    shared function requires experimental validation.

  - >
    Unique KO Annotations: Bars over single dots represent KO annotations present
    only in that sample for the selected pathway. This reflects annotation uniqueness
    in the dataset. Whether unique annotations correspond to unique functional
    contributions requires experimental investigation.

  - >
    Samples with Exclusive Annotations: A sample that is the sole contributor of
    specific KO annotations for a pathway has unique annotation coverage for those
    KOs in the dataset. This is an annotation-level observation and does not
    confirm that those KOs are functionally essential or that the sample is
    required for pathway completeness.

  - >
    Annotation Overlap Analysis: This visualization maps how KO annotations for
    a selected pathway are shared or partitioned across samples. The intersection
    patterns reflect annotation structure in the database and may guide further
    exploratory analyses, but do not confirm functional complementarity or
    consortium design recommendations. Any functional inference requires
    experimental validation.

  - >
    Annotation Coverage Assessment: By comparing KO annotations across samples
    for the selected pathway, one can assess how broadly each pathway's KOs are
    represented across the dataset. Pathways where KO annotations are widely shared
    across many samples are broadly annotated in the database; pathways with many
    unique annotations per sample show more diverse annotation profiles.

color_scheme: "success"
