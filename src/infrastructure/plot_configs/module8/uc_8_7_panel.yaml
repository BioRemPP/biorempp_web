# UC-8.7: Intersection of KO Annotations Across Samples
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-8-7"

scientific_question: >
  How many KO annotations are shared across the selected biological samples,
  and which samples exhibit unique or broadly shared annotation profiles?

description: >
  This visualization employs an UpSet plot to quantitatively analyze the
  intersections of KO annotation sets across multiple biological samples. Unlike
  a Venn diagram, which can become cluttered with many sets, the UpSet plot
  provides a scalable and readable way to visualize the size of every possible
  intersection, highlighting both KO annotations shared across many samples and
  those unique to individual samples.

visual_elements:
  - label: "Sample Multi-Select Dropdown"
    description: >
      Use this to select 2 or more biological samples for intersection analysis.
      The plot will update automatically to show all possible intersections of
      KO annotations across the selected samples. Minimum 2 samples required for
      meaningful visualization.

  - label: "Set Size (Left Bar Chart)"
    description: >
      The horizontal bars on the left show the total number of unique KO
      annotations found in each individual sample. This indicates the overall
      annotation breadth of each biological source. Taller bars indicate broader
      KO annotation coverage in the database.

  - label: "Intersection Matrix (Bottom)"
    description: >
      The grid of dots defines the specific intersection being visualized. A
      vertical line connecting dots indicates that the bar above represents KO
      annotations shared only by those specific samples. Single dots (no
      connections) represent sample-exclusive KO annotations, while multiple
      connected dots show shared annotation patterns.

  - label: "Intersection Size (Top Bar Chart)"
    description: >
      The height of each vertical bar represents the number of KO annotations
      in that specific intersection. Taller bars indicate larger shared annotation
      sets. The tallest bar often reveals the most common pattern of KO annotation
      sharing across the selected samples.

interpretation_guidelines:
  - >
    Broadly Shared KO Annotations: A large bar corresponding to the intersection
    of all selected samples represents KO annotations present across the entire
    group. These are the most broadly shared annotations in the dataset for the
    selected samples and may generate hypotheses about shared annotation sources
    or common KO coverage, but do not confirm shared metabolic function.

  - >
    Unique KO Annotations: Bars corresponding to a single sample (dots with no
    connections) represent KO annotations found only in that sample among those
    selected. These unique annotations may generate hypotheses about annotation
    distinctiveness, but do not confirm specialized biotransformation capabilities
    or niche adaptations.

  - >
    Annotation Overlap Patterns: The plot can help identify the degree of KO
    annotation overlap across samples. Large shared intersections indicate samples
    with similar annotation profiles; small intersections indicate samples with
    more distinct annotations. These are annotation-level observations and do not
    confirm metabolic similarity or ecological relationships.

  - >
    Pairwise Annotation Sharing: Bars with two connected dots show KO annotations
    shared by exactly those two samples, revealing pairwise annotation overlap
    patterns. These may generate hypotheses about shared annotation sources, but
    do not confirm functional partnerships or evolutionary relationships between
    organisms.

  - >
    Multi-Sample Annotation Intersections: Complex intersection patterns (multiple
    connected dots) indicate KO annotations shared across specific subsets of
    samples. These annotation overlap patterns may guide further exploratory
    analyses of annotation structure within the dataset, but should not be
    interpreted as confirming functional guilds, metabolic cooperation, or shared
    evolutionary histories.

color_scheme: "success"
