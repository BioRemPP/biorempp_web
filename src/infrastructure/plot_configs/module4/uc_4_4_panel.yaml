# UC-4.4: Interactive KO Annotation Profile of Samples by Pathway (KEGG)
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-4-4"

scientific_question: >
  What is the KO annotation profile of each biological sample, as defined
  by the distribution and count of unique KO identifiers across its annotated
  metabolic pathways?

description: >
  This interactive visualization allows for the detailed KO annotation profiling
  of individual samples. By selecting a sample from the dropdown menu, the radar
  chart dynamically updates to display its KO annotation profile — the count of
  unique KEGG Orthology (KO) identifiers annotated for each metabolic pathway.

visual_elements:
  - label: "Dropdown Menu"
    description: >
      Use this to select the Sample to analyze. The plot will update
      automatically.

  - label: "Axes (theta)"
    description: >
      Each axis radiating from the center represents an individual Metabolic
      Pathway.

  - label: "Value (r)"
    description: >
      The distance of a point from the center along a pathway's axis indicates
      the count of unique KO annotations that the selected sample has for that
      pathway.

  - label: "Shape"
    description: >
      The blue shape connecting the points represents the sample's overall
      KO annotation profile, showing how annotation counts are distributed
      across different metabolic pathways.

interpretation_guidelines:
  - >
    Annotation Concentration Patterns: The shape of the radar plot can help
    identify which pathways have higher KO annotation counts for a given sample.
    A shape skewed towards a particular set of pathways indicates annotation
    concentration in those pathways. This is an annotation-level observation
    and does not confirm functional specialization or active metabolic processes.

  - >
    Annotation Breadth: A more balanced, circular shape may suggest broad KO
    annotation coverage across many different pathways. This reflects annotation
    distribution in the database and does not confirm broad or evenly distributed
    metabolic activity.

  - >
    Comparative Annotation Profiling: By switching between samples in the dropdown,
    one can directly compare their KO annotation profiles across pathways. Differences
    in profile shapes reflect annotation structure and may generate hypotheses for
    further investigation, but do not confirm metabolic strategies or ecological roles.

color_scheme: "success"
