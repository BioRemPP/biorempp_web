# UC-4.12: Interactive Heatmap of Pathway Relationships by Sample (HADEG)
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-4-12"

scientific_question: >
  For any given biological sample, what is the KO annotation distribution across
  its specific metabolic pathways (Pathway) and the broader chemical classes
  (compound_pathway) they belong to?

description: >
  This interactive visualization provides a KO annotation map of a selected
  sample's pathway structure. By choosing a sample from the dropdown menu,
  the heatmap dynamically updates to show the count of unique KEGG Orthology
  (KO) identifiers at the intersection of each specific Pathway and its
  corresponding compound_pathway.

visual_elements:
  - label: "Dropdown Menu"
    description: >
      Use this to select the Sample to analyze. The plot will update
      automatically.

  - label: "Y-axis (Rows)"
    description: >
      Represents the specific Pathways found in the selected sample.

  - label: "X-axis (Columns)"
    description: >
      Represents the broader Compound Pathways (chemical classes).

  - label: "Cell Color Intensity"
    description: >
      The color intensity of each cell indicates the count of unique KOs
      annotated at the intersection of a specific pathway and a broader
      chemical class for that sample.

  - label: "Hover Information"
    description: >
      Hover over cells to see exact KO counts and identify specific
      pathway-compound pathway combinations.

interpretation_guidelines:
  - >
    Annotation Hotspots: Brightly colored cells indicate a higher KO annotation
    count at the intersection of a specific metabolic pathway and a broader
    compound class within that sample. This reflects annotation density and may
    generate hypotheses for further investigation, but does not confirm that
    these pathways are major contributors to biotransformation of those compounds.

  - >
    Sample KO Annotation Profile: By examining the overall pattern for a
    selected sample, one can explore its KO annotation distribution across
    pathways and compound classes. A sample with many high-count cells in the
    "Alkanes" column, for example, has a higher density of KO annotations
    associated with alkane-related pathways. This is an annotation-level
    observation and does not confirm specialization in alkane biotransformation.

  - >
    Comparative Annotation Profiling: Switching between samples in the dropdown
    allows for direct comparison of their KO annotation maps, highlighting
    differences in annotation distribution across pathways and compound classes.

  - >
    Pathway-Compound Annotation Structure: The matrix can help identify how
    KO annotations are distributed across compound classes and specific pathways
    within a single sample, providing an annotation-level view of the sample's
    database coverage.

  - >
    Annotation Breadth vs. Concentration: A sample with many high-count cells
    across multiple compound pathway columns has broader KO annotation coverage
    across the database, while one with high counts concentrated in few columns
    has more focused annotation coverage. These are annotation patterns and do
    not confirm metabolic breadth or specialization.

color_scheme: "success"
