# UC-4.13: Interactive Genetic Profile by Compound Pathway (HADEG)
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-4-13"

scientific_question: >
  For a given class of chemical pathways (e.g., Alkanes), which specific genes
  are annotated in which biological samples, and how are the KO annotation
  counts distributed across genes and samples in the database?

description: >
  This interactive visualization provides a KO annotation profile of the
  sample dataset for a user-selected compound pathway. By choosing a pathway
  from the dropdown menu, the heatmap dynamically updates to display the
  count of unique KEGG Orthology (KO) identifiers for each gene across all
  samples.

visual_elements:
  - label: "Dropdown Menu"
    description: >
      Use this to select the Compound Pathway to analyze. The plot will update
      automatically.

  - label: "Y-axis (Rows)"
    description: >
      Represents the individual Genes associated with the selected compound
      pathway.

  - label: "X-axis (Columns)"
    description: >
      Represents the individual Samples in your dataset.

  - label: "Cell Color Intensity"
    description: >
      The color intensity of each cell indicates the count of unique KOs
      annotated for a specific gene within a specific sample for the chosen
      pathway.

  - label: "Hover Information"
    description: >
      Hover over cells to see exact KO counts and identify specific
      gene-sample combinations.

interpretation_guidelines:
  - >
    Annotation Hotspots: Brightly colored cells indicate a higher KO annotation
    count for a specific gene in a specific sample. This reflects annotation
    density and may generate hypotheses for further investigation, but does not
    confirm the importance or functional complexity of that gene in the
    biological source.

  - >
    Broadly Annotated Genes: Rows with consistently high values across multiple
    samples represent genes with broad KO annotation coverage across the dataset.
    This is an annotation-level observation and does not confirm that these genes
    are core functional components for biotransforming that class of compounds.

  - >
    Sample KO Annotation Coverage: Columns with numerous high-count cells
    highlight samples with higher KO annotation coverage for the selected
    compound pathway. This is an annotation-level observation and does not
    confirm that those samples are better equipped to process the selected
    compound pathway.

  - >
    Gene-Sample Annotation Matrix: The matrix can help identify the distribution
    of KO annotations across genes and samples, enabling comparative exploration
    of annotation patterns for the selected compound pathway.

  - >
    Pathway-Specific Annotation Comparison: By switching between compound
    pathways in the dropdown, you can compare how KO annotation counts are
    distributed across genes and samples for different chemical compound classes.

color_scheme: "success"
