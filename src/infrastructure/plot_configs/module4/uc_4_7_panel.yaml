# UC-4.7: Interactive Gene-Compound Annotation Explorer
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-4-7"

scientific_question: >
  What are the specific annotation links between individual genes and chemical
  compounds in the dataset, and which biological samples contain these
  co-annotations?

description: >
  This interactive visualization serves as a query tool to explore the annotation
  links between gene symbols and compound names in the BioRemPP database. By
  using one or both dropdown menus, a user can dynamically filter the dataset to
  visualize specific co-annotation relationships. The resulting scatter plot maps
  the presence of these annotation links, providing a tool for exploratory analysis
  and detailed investigation. Each point in the plot represents an annotation
  co-occurrence between a gene symbol and a compound name in the BioRemPP results.

visual_elements:
  - label: "Dropdown Menus"
    description: >
      Use the "Select Compound Name" and "Select Gene Symbol" menus to filter
      the data. The plot updates automatically based on your selection(s). You
      can select one or more values in either filter to explore different
      perspectives. Both dropdowns keep a stable full catalog while the chart
      updates incrementally.

  - label: "Y-axis (Compound Names)"
    description: >
      Represents the chemical compound names identified in the analysis. Each
      unique compound is displayed on the vertical axis.

  - label: "X-axis (Gene Symbols)"
    description: >
      Represents the gene symbols annotated in the dataset. Each unique gene
      is displayed on the horizontal axis.

  - label: "Points (Annotation Links)"
    description: >
      A point at the intersection of a gene and a compound indicates that an
      annotation co-occurrence between them was found in the data. The presence
      of a point reflects this annotation link in at least one sample in the
      database.

  - label: "Hover Information"
    description: >
      Hovering the cursor over a point reveals which sample and KO identifier
      are associated with that specific gene-compound annotation, enabling
      detailed traceability.

interpretation_guidelines:
  - >
    Compound-centric Annotation View: Selecting one or more compounds can help
    identify the combined gene annotation profile for those compounds — the set
    of genes co-annotated with the selected compounds in this dataset. This is
    an annotation-level inventory and does not confirm confirmed gene-compound
    functional interactions.

  - >
    Gene-centric Annotation View: Selecting one or more genes can help identify
    the combined compound annotation profile — the set of compounds co-annotated
    with the selected genes in the database.

  - >
    Dual Filter (Intersection Exploration): Selecting values in both filters
    returns only the intersection between selected compounds and selected genes,
    allowing focused exploration of specific annotation co-occurrences in the
    dataset.

  - >
    Sample Identification: The hover data can help identify precisely which samples
    contain each annotation link, providing traceability for further exploratory
    analyses.

  - >
    Annotation Network Exploration: By exploring different combinations of genes
    and compounds, you can map annotation co-occurrence patterns in the dataset.
    These patterns reflect the annotation structure of the database and may
    generate hypotheses for further investigation, but do not confirm biotransformation
    pathways, functional redundancy, or specialization.

color_scheme: "success"
