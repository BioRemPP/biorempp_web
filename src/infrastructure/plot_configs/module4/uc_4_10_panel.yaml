# UC-4.10: Gene Annotation Count by Enzyme Activity Across Samples
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-4-10"

scientific_question: >
  Which enzyme activity annotations in which biological samples are associated
  with the greatest number of unique gene annotations in the database?

description: >
  This visualization maps the gene annotation count associated with each observed
  enzyme activity annotation across all samples. The bubble chart uses both size
  and color to represent the number of unique gene symbols co-annotated with a
  specific enzyme activity in a particular sample. This approach highlights
  sample-enzyme pairs with high annotation density. Gene annotation count is
  quantified as the count of unique gene symbols, reflecting annotation breadth
  for a given enzyme activity within a biological source.

visual_elements:
  - label: "Y-axis (Samples)"
    description: >
      Represents the individual biological samples in the dataset. Each sample
      is displayed on the vertical axis.

  - label: "X-axis (Enzyme Activities)"
    description: >
      Represents the different enzyme activity annotations identified in the
      analysis. Each unique enzyme activity is displayed on the horizontal axis.

  - label: "Bubble Size and Color"
    description: >
      Both the size and color intensity of each bubble correspond to the count
      of unique gene annotations for that sample-enzyme activity pair. Larger,
      brighter bubbles indicate a higher count of unique gene annotations. The
      color bar on the right provides the quantitative scale.

  - label: "Color Bar"
    description: >
      Located on the right side of the plot, the color bar shows the quantitative
      scale for unique gene annotation count, allowing quick assessment of
      annotation density for each sample-enzyme pair.

  - label: "Hover Information"
    description: >
      Hovering the cursor over a bubble reveals additional details, such as the
      sample name, enzyme activity, and the exact count of unique gene annotations
      associated with that pair.

interpretation_guidelines:
  - >
    Annotation Density Hotspots: Large, brightly colored bubbles indicate
    sample-enzyme pairs with a high count of unique gene annotations in the
    database. These reflect annotation density and may generate hypotheses for
    further investigation, but do not confirm that these enzyme activities are
    functionally important or robustly expressed in those samples.

  - >
    Sample Enzyme Activity Annotation Profile: Reading across a horizontal row
    can help identify a sample's enzyme activity annotation distribution. A sample
    with numerous large bubbles has broad gene annotation coverage across many
    enzyme activities. This is an annotation-level observation and does not
    confirm broad enzymatic capability.

  - >
    Broadly vs. Narrowly Annotated Enzyme Activities: Reading down a vertical
    column reveals how gene annotation counts for a given enzyme activity are
    distributed across samples. An activity with large bubbles in many samples
    is broadly annotated across the dataset. An activity with only a few small
    bubbles has narrower annotation coverage. These are annotation patterns and
    do not confirm functional conservation or specialization.

  - >
    Annotation Overlap per Enzyme Activity: Multiple gene annotations for the
    same enzyme activity within a single sample reflect annotation density for
    that activity in the database. This is an annotation-level observation and
    does not confirm functional redundancy or adaptability.

  - >
    Broad Annotation Coverage: Samples showing high gene annotation counts across
    multiple enzyme activities have broader overall annotation coverage in the
    database. This may guide further exploratory analyses, but does not confirm
    biotransformation versatility or suitability for any specific application.

color_scheme: "success"
