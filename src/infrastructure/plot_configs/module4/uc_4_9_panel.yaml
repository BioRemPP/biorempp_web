# UC-4.9: Interactive Gene Annotation Count by Enzyme Activity per Sample
# Informative Panel Configuration

use_case_id: "uc-4-9"

scientific_question: >
  For any given biological sample, which enzyme activity annotations have the
  highest number of unique gene annotations co-occurring with them in the database?

description: >
  This interactive visualization provides a gene annotation count profile for a
  selected sample, ranked by enzyme activity annotation. By choosing a sample
  from the dropdown menu, the bar chart dynamically updates to display the number
  of unique gene symbols co-annotated with each enzyme activity annotation. This
  highlights which enzyme activity annotations have the highest gene annotation
  density within that sample in the database.

visual_elements:
  - label: "Dropdown Menu"
    description: >
      Use this to select the Sample to analyze. The plot will update automatically.

  - label: "X-axis"
    description: >
      Represents the individual Enzyme Activity annotations found in the selected
      sample.

  - label: "Y-axis"
    description: >
      Represents the count of unique gene annotations associated with each enzyme
      activity annotation.

  - label: "Bar Height and Label"
    description: >
      The height of each bar and its corresponding numerical label indicate the
      total number of unique gene annotations for that enzyme activity annotation
      in the selected sample.

interpretation_guidelines:
  - >
    Gene Annotation Count per Enzyme Activity: Taller bars represent enzyme
    activity annotations with a higher number of unique gene annotations in the
    database for that sample. This reflects annotation density and may generate
    hypotheses for further investigation, but does not confirm that these enzyme
    activities are more important or more actively expressed in the sample.

  - >
    Enzyme Activity Annotation Coverage: The ranking of enzyme activity annotations
    can help identify which activities have the highest gene annotation counts for
    the selected sample. For example, an activity showing high gene counts may
    have broader annotation coverage in the database, which is an annotation-level
    observation and does not confirm functional specialization in oxidative or other
    biotransformation processes.

  - >
    Comparative Annotation Profiles: By switching between samples, one can directly
    compare their gene annotation counts per enzyme activity. Differences in these
    profiles reflect annotation structure and may generate hypotheses for further
    investigation, but do not confirm that one sample relies more heavily on specific
    enzymatic functions than another.

color_scheme: "success"
