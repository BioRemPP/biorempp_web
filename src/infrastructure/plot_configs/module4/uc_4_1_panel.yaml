# UC-4.1: Interactive KO Annotation Profile of Samples by Metabolic Pathway (KEGG)
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-4-1"

scientific_question: >
  What is the KO annotation profile of each biological sample, as defined
  by the number of unique KO identifiers associated with each annotated
  metabolic pathway?

description: >
  This interactive visualization allows for the detailed KO annotation profiling
  of individual samples. By selecting a sample from the dropdown menu, the bar
  chart dynamically updates to display and rank all the metabolic pathways
  annotated for that sample based on the number of unique KEGG Orthology (KO)
  identifiers associated with each pathway.

visual_elements:
  - label: "Dropdown Menu"
    description: >
      Use this to select the Sample to analyze. The plot will update
      automatically.

  - label: "Y-axis"
    description: >
      Represents the individual KEGG Pathways annotated for the selected sample.

  - label: "X-axis"
    description: >
      Represents the count of unique KO annotations associated with each pathway.

  - label: "Bar Length and Label"
    description: >
      The length of each bar and its corresponding numerical label indicate the
      total number of unique KO annotations for that pathway in the selected sample,
      reflecting annotation density per pathway.

interpretation_guidelines:
  - >
    Highly Annotated Pathways: The longest bars represent the pathways with the
    highest KO annotation counts for that specific sample. This can help identify
    which pathways have broader annotation coverage, but does not confirm primary
    metabolic activity or functional specialization.

  - >
    Comparative Annotation Profiles: By switching between samples in the dropdown,
    one can directly compare their KO annotation profiles across pathways. Differences
    in annotation counts may generate hypotheses about annotation coverage patterns,
    but do not confirm that one sample is enriched in specific metabolic activity
    relative to another.

  - >
    Pathway Annotation Inventory: The chart provides an overview of which KEGG
    pathways have KO annotations in each sample and how many unique KOs are
    annotated per pathway. This is an annotation-level inventory and does not
    confirm which metabolic pathways are actively expressed or functionally
    complete in the sample.

color_scheme: "success"
