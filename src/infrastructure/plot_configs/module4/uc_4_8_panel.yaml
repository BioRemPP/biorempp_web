# UC-4.8: Interactive Gene Annotation Inventory Explorer by Sample and Gene Symbol
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-4-8"

scientific_question: >
  What is the gene annotation inventory of each biological sample, and which
  samples contain annotations for a particular gene of interest?

description: >
  This interactive visualization serves as a query tool to explore the gene
  annotation content of each sample. By using one or both dropdown menus, a user
  can dynamically filter the dataset to visualize specific annotation relationships.
  The resulting scatter plot maps the presence of gene annotations within samples,
  providing a tool for comparative annotation analysis and exploratory investigation.
  Each point in the plot represents the presence of a gene annotation within a
  sample in the database.

visual_elements:
  - label: "Dropdown Menus"
    description: >
      Use the "Select Sample" and "Select Gene Symbol" menus to filter the
      data. The plot updates automatically based on your selection(s). You can
      select one or more values in either filter to explore different annotation
      perspectives. Both dropdowns keep a stable full catalog while the chart
      updates incrementally.

  - label: "Y-axis (Samples)"
    description: >
      Represents the individual biological samples in the dataset. Each sample
      is displayed on the vertical axis.

  - label: "X-axis (Gene Symbols)"
    description: >
      Represents the gene symbols annotated in the analysis. Each unique gene
      is displayed on the horizontal axis.

  - label: "Points (Gene Annotation Presence)"
    description: >
      A point at the intersection of a sample and a gene symbol indicates that
      the sample has an annotation for that gene in the database.

  - label: "Hover Information"
    description: >
      Hovering the cursor over a point reveals the specific compound name and
      KO identifier associated with that gene annotation in that sample, providing
      annotation context.

interpretation_guidelines:
  - >
    Sample-centric Annotation View: Selecting one or more samples can help identify
    their combined gene annotation inventory — the set of gene annotations found
    across the selected samples in the database.

  - >
    Gene-centric Annotation View: Selecting one or more genes can help identify
    which samples contain annotations for those genes — the distribution of those
    gene annotations across the dataset.

  - >
    Dual Filter (Intersection Exploration): Selecting values in both filters
    returns only the intersection between selected samples and selected genes,
    allowing focused exploration of specific gene annotation co-occurrences.

  - >
    Comparative Annotation Patterns: By exploring different samples, you can
    identify gene annotations present across many samples versus those present
    in fewer samples. These annotation patterns may generate hypotheses for
    further investigation but do not confirm core versus accessory functional roles.

  - >
    Annotation Breadth: Samples with gene annotations across many genes (many
    horizontal points) have broader annotation coverage in the database. This
    is an annotation-level observation and does not confirm diverse functional
    capabilities or suitability for specific applications.

color_scheme: "success"
