# UC-4.2: Interactive Ranking of Samples by Pathway KO Annotation Count (KEGG)
# Informative Panel Configuration

use_case_id: "uc-4-2"

scientific_question: >
  For any given metabolic pathway, which biological samples have the highest
  KO annotation count, and how does this annotation coverage vary across
  samples?

description: >
  This interactive visualization allows for the comparative analysis of KO
  annotation coverage at the pathway level. By selecting a metabolic pathway
  from the dropdown menu, the bar chart dynamically updates to rank each sample
  based on the number of unique KEGG Orthology (KO) identifiers annotated for
  that specific pathway.

visual_elements:
  - label: "Dropdown Menu"
    description: >
      Use this to select the Metabolic Pathway to analyze. The plot will
      update automatically.

  - label: "X-axis"
    description: >
      Represents the individual Samples.

  - label: "Y-axis"
    description: >
      Represents the count of unique KO annotations associated with the
      selected pathway for each sample.

  - label: "Bar Height and Label"
    description: >
      The height of each bar and its corresponding numerical label indicate the
      total number of unique KO annotations for that sample within the chosen
      pathway, reflecting annotation density for that pathway per sample.

interpretation_guidelines:
  - >
    Annotation Count per Pathway: Taller bars indicate that a sample has more
    unique KO annotations for the selected pathway in the database. This reflects
    annotation coverage and may guide further exploratory analyses, but does not
    confirm functional completeness or the number of active enzymatic steps for
    that pathway.

  - >
    Comparing Annotation Coverage Across Samples: By selecting a specific pathway,
    the chart can help identify which samples show higher KO annotation counts for
    that pathway. These samples have broader annotation coverage for that pathway
    in the database, which may generate hypotheses for further investigation but
    does not confirm functional specialization.

  - >
    Comparative Annotation Profiles: The tool enables rapid comparison of KO
    annotation counts across samples for different pathways. A sample that
    consistently shows high annotation counts across many pathways has broader
    overall annotation coverage. These are annotation-level observations and do
    not confirm metabolic versatility or the ability to perform specific metabolic
    tasks.

color_scheme: "success"
