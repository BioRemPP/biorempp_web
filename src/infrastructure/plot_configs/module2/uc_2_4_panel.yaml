# UC-2.4: Ranking of Compounds by Genetic Interaction within Chemical Classes
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-2-4"

scientific_question: >
  Within a specific chemical class, which compounds are associated with the
  greatest diversity of unique genes, suggesting they may involve more complex
  or varied enzymatic machinery for biotransformation?

description: >
  This interactive visualization ranks compounds based on the number of unique
  genes associated with them, filterable by the compound's chemical class.
  The resulting bar chart highlights which compounds show the greatest gene
  diversity in their annotations for a selected category.

visual_elements:
  - label: "Dropdown Menu"
    description: >
      Use this to select the Compound Class to analyze. The plot will update
      automatically.
  
  - label: "X-axis"
    description: "Represents the individual Compounds within the selected class."
  
  - label: "Y-axis"
    description: >
      Represents the count of unique genes that interact with each compound.
  
  - label: "Bar Height and Label"
    description: >
      The height of each bar and its corresponding numerical label explicitly
      state the total number of unique genes associated with that compound.

interpretation_guidelines:
  - >
    High Gene Diversity: Taller bars represent compounds associated with a larger
    and more diverse set of genes in the annotation data. This may suggest the
    involvement of multiple functional roles in related pathways, though the
    annotation diversity does not confirm the complexity or number of steps in
    any biotransformation process.

  - >
    Low Gene Diversity: Shorter bars, especially those with a count of '1',
    indicate compounds associated with fewer annotated genes. This may reflect
    a narrower annotation profile or more limited co-occurrence data, rather
    than confirmed enzymatic simplicity.

  - >
    Comparing Chemical Classes: The dropdown allows comparison of gene-association
    patterns across chemical classes. This can help explore whether certain classes
    show broader gene diversity in their annotations — generating hypotheses about
    functional complexity differences that would require experimental follow-up
    to validate.

color_scheme: "success"
