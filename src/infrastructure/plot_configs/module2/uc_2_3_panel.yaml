# UC-2.3: Ranking of Compound Richness by Sample per Chemical Class
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-2-3"

scientific_question: >
  Within a specific chemical class, which compounds are associated with the
  widest range of biological samples in the dataset, and what hypotheses might
  this pattern suggest about shared functional potential?

description: >
  This interactive visualization ranks compounds based on the number of unique
  samples with which they are associated, filterable by the compound's chemical
  class. The resulting bar chart highlights which compounds show the broadest
  sample co-occurrence within the selected category.

visual_elements:
  - label: "Dropdown Menu"
    description: >
      Use this to select the Compound Class to analyze. The plot will update
      automatically.
  
  - label: "X-axis"
    description: "Represents the individual Compounds within the selected class."
  
  - label: "Y-axis"
    description: "Represents the count of unique samples that interact with each compound."
  
  - label: "Bar Height and Label"
    description: >
      The height of each bar and its corresponding numerical label explicitly
      state the total number of unique samples associated with that compound.

interpretation_guidelines:
  - >
    Broad Sample Co-occurrence: Taller bars represent compounds associated with
    a greater number of samples in the dataset. This pattern may suggest widespread
    annotation coverage and can serve as a hypothesis-generating signal — for
    example, about shared functional potential across sources — but does not
    establish causality or confirm biotransformation activity.

  - >
    Narrow Association Profiles: Shorter bars, especially those with a count of
    '1', indicate compounds associated with only a few samples. This may reflect
    a more limited annotation overlap or a narrower co-occurrence pattern in the
    dataset, rather than a confirmed rare metabolic capability.

  - >
    Comparing Chemical Classes: The dropdown allows comparison of association
    patterns across different chemical classes. This can help identify whether
    certain classes show broader or more concentrated sample co-occurrence,
    generating hypotheses about functional coverage differences across compound
    categories.

color_scheme: "success"
