# UC-2.2: Ranking of Samples by Compound Richness
# Panel Configuration (Informative Collapsible Panel)

use_case_id: "uc-2-2"

scientific_question: >
  Which biological samples interact with the widest variety of unique chemical compounds?

description: >
  This visualization ranks each sample based on the total number of unique
  compounds with which it is associated in the dataset. The resulting bar chart
  provides a comparative view of compound association breadth across biological
  sources, based on annotation data.

visual_elements:
  - label: "Y-axis"
    description: "Represents the individual Samples."
  
  - label: "X-axis"
    description: "Represents the absolute count of unique compounds."
  
  - label: "Bar Height and Label"
    description: >
      The height of each bar and its corresponding numerical label
      explicitly state the total unique compound count for that sample.

interpretation_guidelines:
  - >
    Compound Association Breadth: Taller bars correspond to samples associated
    with a greater number of unique compounds in the dataset. This reflects the
    breadth of annotation-level compound associations and may serve as a basis
    for comparing samples, but does not confirm actual interaction capacity or
    metabolic versatility.

  - >
    Comparative Ranking: The chart enables direct comparison and ranking of
    samples by compound association count, which can help orient exploratory
    analyses or hypothesis generation about which samples show broader or
    narrower compound coverage.

  - >
    Narrow Association Profiles: Samples with shorter bars are associated with
    fewer unique compounds in the dataset. This may reflect a more focused
    annotation profile, smaller dataset representation, or a narrower compound
    scope — not necessarily lower biological activity or relevance.

color_scheme: "primary"
