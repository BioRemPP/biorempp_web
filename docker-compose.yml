# ============================================================================
# BioRemPP v1.0.3 - Docker Compose Configuration (Optimized)
# ============================================================================
# Unified orchestration for development and production environments
#
# ============================================================================
# IMPORTANT - DEVELOPMENT TOOLS (pytest, black, mypy, mkdocs)
# ============================================================================
# Development tools are NOT included in Docker images to reduce size.
# Install them LOCALLY in your virtual environment:
#
#   # Create and activate virtualenv
#   python -m venv .venv
#   source .venv/bin/activate    # Linux/Mac
#   .venv\Scripts\activate       # Windows
#
#   # Install development dependencies locally
#   pip install -e ".[dev,docs,profiling]"
#
#   # Now you can run:
#   pytest tests/                # Run tests
#   black src/                   # Format code
#   mypy src/                    # Type checking
#   mkdocs serve                 # Documentation
#
# ============================================================================
# QUICK START
# ============================================================================
#   Development:  docker compose --env-file .env/env.development --profile dev up
#   Production:   docker compose --env-file .env/env.production --profile prod up -d
#   With nginx:   docker compose --env-file .env/env.production --profile prod --profile nginx up -d
#   With cache:   docker compose --env-file .env/env.production --profile prod --profile cache up -d
#
# ============================================================================
# ENVIRONMENT CONFIGURATION
# ============================================================================
#   1. Copy .env/env.development to .env/env.local (development)
#      OR .env/env.production to .env/env.local (production)
#   2. Adjust values as needed (SECRET_KEY, ports, etc.)
#   3. Use: docker compose --env-file .env/env.local --profile <dev|prod> up
# ============================================================================

# ============================================================================
# SERVICES
# ============================================================================
services:
  # ==========================================================================
  # BioRemPP Application (Development)
  # ==========================================================================
  biorempp-dev:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: development
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11}
        APP_USER: ${APP_USER:-biorempp}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: biorempp:dev
    container_name: biorempp-dev
    profiles: ["dev"]
    
    environment:
      # Application
      BIOREMPP_ENV: development
      BIOREMPP_HOST: ${BIOREMPP_HOST:-0.0.0.0}
      BIOREMPP_PORT: ${BIOREMPP_PORT:-8050}
      BIOREMPP_DEBUG: ${BIOREMPP_DEBUG:-True}
      BIOREMPP_HOT_RELOAD: ${BIOREMPP_HOT_RELOAD:-False}
      BIOREMPP_LOG_LEVEL: ${BIOREMPP_LOG_LEVEL:-INFO}
      BIOREMPP_CACHE_DIR: ${BIOREMPP_CACHE_DIR:-/app/cache}
      BIOREMPP_RESUME_BACKEND: ${BIOREMPP_RESUME_BACKEND:-diskcache}
      BIOREMPP_RESUME_TTL_SECONDS: ${BIOREMPP_RESUME_TTL_SECONDS:-14400}
      BIOREMPP_RESUME_CACHE_SIZE_MB: ${BIOREMPP_RESUME_CACHE_SIZE_MB:-512}
      BIOREMPP_RESUME_MAX_PAYLOAD_MB: ${BIOREMPP_RESUME_MAX_PAYLOAD_MB:-64}
      BIOREMPP_RESUME_SECURITY_MODE: ${BIOREMPP_RESUME_SECURITY_MODE:-normal}
      BIOREMPP_RESUME_RATE_LIMIT_ATTEMPTS: ${BIOREMPP_RESUME_RATE_LIMIT_ATTEMPTS:-10}
      BIOREMPP_RESUME_RATE_LIMIT_WINDOW_SECONDS: ${BIOREMPP_RESUME_RATE_LIMIT_WINDOW_SECONDS:-60}
      BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_BASE_SECONDS: ${BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_BASE_SECONDS:-5}
      BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_MAX_SECONDS: ${BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_MAX_SECONDS:-300}
      BIOREMPP_RESUME_RATE_LIMIT_CACHE_SIZE_MB: ${BIOREMPP_RESUME_RATE_LIMIT_CACHE_SIZE_MB:-64}
      BIOREMPP_RESUME_ALERT_WINDOW_SECONDS: ${BIOREMPP_RESUME_ALERT_WINDOW_SECONDS:-300}
      BIOREMPP_RESUME_ALERT_NOT_FOUND_THRESHOLD: ${BIOREMPP_RESUME_ALERT_NOT_FOUND_THRESHOLD:-30}
      BIOREMPP_RESUME_ALERT_TOKEN_MISMATCH_THRESHOLD: ${BIOREMPP_RESUME_ALERT_TOKEN_MISMATCH_THRESHOLD:-10}
      BIOREMPP_RESUME_ALERT_SAVE_FAILED_THRESHOLD: ${BIOREMPP_RESUME_ALERT_SAVE_FAILED_THRESHOLD:-5}
      BIOREMPP_RESUME_REDIS_HOST: ${BIOREMPP_RESUME_REDIS_HOST:-redis}
      BIOREMPP_RESUME_REDIS_PORT: ${BIOREMPP_RESUME_REDIS_PORT:-6379}
      BIOREMPP_RESUME_REDIS_DB: ${BIOREMPP_RESUME_REDIS_DB:-0}
      BIOREMPP_RESUME_REDIS_PASSWORD: ${BIOREMPP_RESUME_REDIS_PASSWORD:-change-this-redis-password}
      BIOREMPP_RESUME_REDIS_KEY_PREFIX: ${BIOREMPP_RESUME_REDIS_KEY_PREFIX:-biorempp:resume:}
      BIOREMPP_RESUME_REDIS_COMPRESSION_LEVEL: ${BIOREMPP_RESUME_REDIS_COMPRESSION_LEVEL:-6}
      BIOREMPP_RESUME_REDIS_SOCKET_TIMEOUT_SECONDS: ${BIOREMPP_RESUME_REDIS_SOCKET_TIMEOUT_SECONDS:-3}
      BIOREMPP_RESUME_REDIS_HEALTHCHECK: ${BIOREMPP_RESUME_REDIS_HEALTHCHECK:-false}
      
      # Python
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      DOCKER_ENV: true
      
      # Cache (optional)
      ENABLE_CACHE: ${ENABLE_CACHE:-False}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-this-redis-password}
    
    ports:
      - "${DEV_PORT:-8050}:8050"
    
    volumes:
      # Hot reload - mount source code
      - ./src:/app/src:rw
      - ./config:/app/config:rw
      - ./biorempp_app.py:/app/biorempp_app.py:rw
      - ./data:/app/data:rw

      # Data persistence
      - biorempp-dev-logs:/app/logs
      - biorempp-dev-cache:/app/cache
    
    networks:
      - biorempp-network
    
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8050/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped

  # ==========================================================================
  # BioRemPP Application (Production)
  # ==========================================================================
  biorempp:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: production
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11}
        APP_USER: ${APP_USER:-biorempp}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: biorempp:prod
    container_name: biorempp
    profiles: ["prod"]
    
    environment:
      # Application
      BIOREMPP_ENV: production
      BIOREMPP_HOST: ${BIOREMPP_HOST:-0.0.0.0}
      BIOREMPP_PORT: ${BIOREMPP_PORT:-8080}
      BIOREMPP_DEBUG: False
      BIOREMPP_HOT_RELOAD: False
      BIOREMPP_LOG_LEVEL: ${BIOREMPP_LOG_LEVEL:-WARNING}
      BIOREMPP_CACHE_DIR: ${BIOREMPP_CACHE_DIR:-/app/cache}
      BIOREMPP_RESUME_BACKEND: ${BIOREMPP_RESUME_BACKEND:-redis}
      BIOREMPP_RESUME_TTL_SECONDS: ${BIOREMPP_RESUME_TTL_SECONDS:-14400}
      BIOREMPP_RESUME_CACHE_SIZE_MB: ${BIOREMPP_RESUME_CACHE_SIZE_MB:-1024}
      BIOREMPP_RESUME_MAX_PAYLOAD_MB: ${BIOREMPP_RESUME_MAX_PAYLOAD_MB:-64}
      BIOREMPP_RESUME_SECURITY_MODE: ${BIOREMPP_RESUME_SECURITY_MODE:-strict}
      BIOREMPP_RESUME_RATE_LIMIT_ATTEMPTS: ${BIOREMPP_RESUME_RATE_LIMIT_ATTEMPTS:-10}
      BIOREMPP_RESUME_RATE_LIMIT_WINDOW_SECONDS: ${BIOREMPP_RESUME_RATE_LIMIT_WINDOW_SECONDS:-60}
      BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_BASE_SECONDS: ${BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_BASE_SECONDS:-5}
      BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_MAX_SECONDS: ${BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_MAX_SECONDS:-300}
      BIOREMPP_RESUME_RATE_LIMIT_CACHE_SIZE_MB: ${BIOREMPP_RESUME_RATE_LIMIT_CACHE_SIZE_MB:-64}
      BIOREMPP_RESUME_ALERT_WINDOW_SECONDS: ${BIOREMPP_RESUME_ALERT_WINDOW_SECONDS:-300}
      BIOREMPP_RESUME_ALERT_NOT_FOUND_THRESHOLD: ${BIOREMPP_RESUME_ALERT_NOT_FOUND_THRESHOLD:-30}
      BIOREMPP_RESUME_ALERT_TOKEN_MISMATCH_THRESHOLD: ${BIOREMPP_RESUME_ALERT_TOKEN_MISMATCH_THRESHOLD:-10}
      BIOREMPP_RESUME_ALERT_SAVE_FAILED_THRESHOLD: ${BIOREMPP_RESUME_ALERT_SAVE_FAILED_THRESHOLD:-5}
      BIOREMPP_RESUME_REDIS_HOST: ${BIOREMPP_RESUME_REDIS_HOST:-redis}
      BIOREMPP_RESUME_REDIS_PORT: ${BIOREMPP_RESUME_REDIS_PORT:-6379}
      BIOREMPP_RESUME_REDIS_DB: ${BIOREMPP_RESUME_REDIS_DB:-0}
      BIOREMPP_RESUME_REDIS_PASSWORD: ${BIOREMPP_RESUME_REDIS_PASSWORD:-change-this-redis-password}
      BIOREMPP_RESUME_REDIS_KEY_PREFIX: ${BIOREMPP_RESUME_REDIS_KEY_PREFIX:-biorempp:resume:}
      BIOREMPP_RESUME_REDIS_COMPRESSION_LEVEL: ${BIOREMPP_RESUME_REDIS_COMPRESSION_LEVEL:-6}
      BIOREMPP_RESUME_REDIS_SOCKET_TIMEOUT_SECONDS: ${BIOREMPP_RESUME_REDIS_SOCKET_TIMEOUT_SECONDS:-3}
      BIOREMPP_RESUME_REDIS_HEALTHCHECK: ${BIOREMPP_RESUME_REDIS_HEALTHCHECK:-true}
      
      # Gunicorn
      BIOREMPP_WORKERS: ${BIOREMPP_WORKERS:-4}
      BIOREMPP_WORKER_CLASS: ${BIOREMPP_WORKER_CLASS:-gevent}
      BIOREMPP_WORKER_CONNECTIONS: ${BIOREMPP_WORKER_CONNECTIONS:-1000}
      BIOREMPP_TIMEOUT: ${BIOREMPP_TIMEOUT:-300}
      BIOREMPP_KEEPALIVE: ${BIOREMPP_KEEPALIVE:-5}
      BIOREMPP_MAX_REQUESTS: ${BIOREMPP_MAX_REQUESTS:-1000}
      BIOREMPP_MAX_REQUESTS_JITTER: ${BIOREMPP_MAX_REQUESTS_JITTER:-100}
      BIOREMPP_LIMIT_REQUEST_LINE: ${BIOREMPP_LIMIT_REQUEST_LINE:-4096}
      BIOREMPP_LIMIT_REQUEST_FIELD_SIZE: ${BIOREMPP_LIMIT_REQUEST_FIELD_SIZE:-8190}
      BIOREMPP_LIMIT_REQUEST_FIELDS: ${BIOREMPP_LIMIT_REQUEST_FIELDS:-100}
      BIOREMPP_MAX_REQUEST_BODY_BYTES: ${BIOREMPP_MAX_REQUEST_BODY_BYTES:-5242880}
      
      # Python
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-REPLACE_WITH_REAL_SECRET_FROM_DOCKER_SECRETS}
      
      # Cache (optional)
      ENABLE_CACHE: ${ENABLE_CACHE:-False}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-this-redis-password}
      
      # SSL/HTTPS
      ENABLE_HTTPS: ${ENABLE_HTTPS:-False}
      DOMAIN: ${DOMAIN:-localhost}
    
    # Expose port for direct access (comment out when using nginx)
    ports:
      - "${PROD_PORT:-8080}:8080"
    
    volumes:
      # Data persistence only (no source code mounting)
      - biorempp-logs:/app/logs
      - biorempp-data:/app/data
      - biorempp-cache:/app/cache
    
    networks:
      - biorempp-network
    
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped
    
    # Resource limits (adjust based on server capacity)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # ==========================================================================
  # Nginx Reverse Proxy (Production)
  # ==========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: biorempp-nginx
    profiles: ["nginx"]
    
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    
    volumes:
      # Configuration
      - ./.docker/nginx/${NGINX_CONFIG:-nginx.prod.conf}:/etc/nginx/conf.d/default.conf:ro
      
      # SSL certificates (Let's Encrypt)
      - letsencrypt-certs:/etc/letsencrypt:ro
      - letsencrypt-www:/var/www/certbot:ro
      
      # Static files (optional - serve directly from nginx)
      - ./src/assets:/app/src/assets:ro
      
      # Logs
      - nginx-logs:/var/log/nginx
    
    networks:
      - biorempp-network
    
    depends_on:
      biorempp:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    
    restart: unless-stopped

  # ==========================================================================
  # Certbot for Let's Encrypt SSL (Production)
  # ==========================================================================
  certbot:
    image: certbot/certbot:latest
    container_name: biorempp-certbot
    profiles: ["nginx"]
    
    volumes:
      - letsencrypt-certs:/etc/letsencrypt
      - letsencrypt-www:/var/www/certbot
    
    # Run certbot renew daily at 3am
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done;'"
    
    restart: unless-stopped

  # ==========================================================================
  # Redis Cache (Optional)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: biorempp-redis
    profiles: ["prod", "cache"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-this-redis-password}
    
    command: >
      sh -c "redis-server
      --appendonly yes
      --requirepass $${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAXMEMORY:-512mb}
      --maxmemory-policy allkeys-lru"
    
    expose:
      - "6379"
    
    volumes:
      - redis-data:/data
    
    networks:
      - biorempp-network
    
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    restart: unless-stopped

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  biorempp-network:
    name: biorempp-network
    driver: bridge

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  # Development
  biorempp-dev-logs:
    name: biorempp-dev-logs
  biorempp-dev-cache:
    name: biorempp-dev-cache
  
  # Production
  biorempp-logs:
    name: biorempp-logs
  biorempp-data:
    name: biorempp-data
  biorempp-cache:
    name: biorempp-cache
  
  # Nginx
  nginx-logs:
    name: nginx-logs
  
  # Let's Encrypt
  letsencrypt-certs:
    name: letsencrypt-certs
  letsencrypt-www:
    name: letsencrypt-www
  
  # Redis
  redis-data:
    name: redis-data
