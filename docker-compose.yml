# ============================================================================
# BioRemPP v1.0.3 - Docker Compose Configuration (Optimized)
# ============================================================================
# Unified orchestration for development and production environments
#
# ============================================================================
# IMPORTANT - DEVELOPMENT TOOLS (pytest, black, mypy, mkdocs)
# ============================================================================
# Development tools are NOT included in Docker images to reduce size.
# Install them LOCALLY in your virtual environment:
#
#   # Create and activate virtualenv
#   python -m venv .venv
#   source .venv/bin/activate    # Linux/Mac
#   .venv\Scripts\activate       # Windows
#
#   # Install development dependencies locally
#   pip install -e ".[dev,docs,profiling]"
#
#   # Now you can run:
#   pytest tests/                # Run tests
#   black src/                   # Format code
#   mypy src/                    # Type checking
#   mkdocs serve                 # Documentation
#
# ============================================================================
# QUICK START
# ============================================================================
#   Development:  docker compose --env-file .env/env.development --profile dev up
#   Production:   docker compose --env-file .env/env.production --profile prod up -d
#   Prod + Nginx: docker compose --env-file .env/env.production --profile prod up -d
#   With nginx mock TLS: docker compose --env-file .env/env.production --profile prod --profile nginx-mock up -d
#   With cache:   docker compose --env-file .env/env.production --profile prod --profile cache up -d
#   Full stack:   docker compose --env-file .env/env.production --env-file .env/env.production.stack --profile prod --profile cache --profile observability up -d
#
# ============================================================================
# ENVIRONMENT CONFIGURATION
# ============================================================================
#   1. Copy .env/env.development to .env/env.local (development)
#      OR .env/env.production to .env/env.local (production)
#   2. Adjust values as needed (SECRET_KEY, ports, etc.)
#   3. Use: docker compose --env-file .env/env.local --profile <dev|prod> up
# ============================================================================

# ============================================================================
# SERVICES
# ============================================================================
services:
  # ==========================================================================
  # Volume Permission Init (Production)
  # ==========================================================================
  biorempp-volume-init:
    image: alpine:3.20
    container_name: biorempp-volume-init
    profiles: ["prod"]

    environment:
      APP_UID: ${UID:-1000}
      APP_GID: ${GID:-1000}

    command: >
      sh -c "set -eu;
             mkdir -p /app/logs /app/data /app/cache;
             chown -R $${APP_UID}:$${APP_GID} /app/logs /app/data /app/cache;
             chmod -R u+rwX,g+rwX /app/logs /app/data /app/cache;
             echo '[INFO] Volume ownership and permissions initialized';"

    volumes:
      - biorempp-logs:/app/logs
      - biorempp-data:/app/data
      - biorempp-cache:/app/cache

    restart: "no"

  # ==========================================================================
  # BioRemPP Application (Development)
  # ==========================================================================
  biorempp-dev:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: development
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11}
        APP_USER: ${APP_USER:-biorempp}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: biorempp:dev
    container_name: biorempp-dev
    profiles: ["dev"]
    
    environment:
      # Application
      BIOREMPP_ENV: development
      BIOREMPP_HOST: ${BIOREMPP_HOST:-0.0.0.0}
      BIOREMPP_PORT: ${BIOREMPP_PORT:-8050}
      BIOREMPP_URL_BASE_PATH: ${BIOREMPP_URL_BASE_PATH:-/}
      BIOREMPP_DEBUG: ${BIOREMPP_DEBUG:-True}
      BIOREMPP_HOT_RELOAD: ${BIOREMPP_HOT_RELOAD:-False}
      BIOREMPP_LOG_LEVEL: ${BIOREMPP_LOG_LEVEL:-INFO}
      BIOREMPP_CACHE_DIR: ${BIOREMPP_CACHE_DIR:-/app/cache}
      BIOREMPP_OBSERVABILITY_ENABLED: ${BIOREMPP_OBSERVABILITY_ENABLED:-false}
      BIOREMPP_OBSERVABILITY_METRICS_PATH: ${BIOREMPP_OBSERVABILITY_METRICS_PATH:-/metrics}
      BIOREMPP_TRUST_PROXY_HEADERS: ${BIOREMPP_TRUST_PROXY_HEADERS:-false}
      BIOREMPP_TRUSTED_PROXY_CIDRS: ${BIOREMPP_TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128}
      BIOREMPP_PUBLIC_DATA_ALLOWED_FILES: ${BIOREMPP_PUBLIC_DATA_ALLOWED_FILES:-exemple_dataset.txt}
      BIOREMPP_LOG_REF_SALT: ${BIOREMPP_LOG_REF_SALT:-}
      BIOREMPP_LOG_REF_LENGTH: ${BIOREMPP_LOG_REF_LENGTH:-12}
      BIOREMPP_RESUME_BACKEND: ${BIOREMPP_RESUME_BACKEND:-diskcache}
      BIOREMPP_RESUME_TTL_SECONDS: ${BIOREMPP_RESUME_TTL_SECONDS:-14400}
      BIOREMPP_RESUME_CACHE_SIZE_MB: ${BIOREMPP_RESUME_CACHE_SIZE_MB:-512}
      BIOREMPP_RESUME_MAX_PAYLOAD_MB: ${BIOREMPP_RESUME_MAX_PAYLOAD_MB:-64}
      BIOREMPP_RESUME_SECURITY_MODE: ${BIOREMPP_RESUME_SECURITY_MODE:-normal}
      BIOREMPP_RESUME_RATE_LIMIT_ATTEMPTS: ${BIOREMPP_RESUME_RATE_LIMIT_ATTEMPTS:-10}
      BIOREMPP_RESUME_RATE_LIMIT_WINDOW_SECONDS: ${BIOREMPP_RESUME_RATE_LIMIT_WINDOW_SECONDS:-60}
      BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_BASE_SECONDS: ${BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_BASE_SECONDS:-5}
      BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_MAX_SECONDS: ${BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_MAX_SECONDS:-300}
      BIOREMPP_RESUME_RATE_LIMIT_CACHE_SIZE_MB: ${BIOREMPP_RESUME_RATE_LIMIT_CACHE_SIZE_MB:-64}
      BIOREMPP_RESUME_RATE_LIMIT_BACKEND: ${BIOREMPP_RESUME_RATE_LIMIT_BACKEND:-auto}
      BIOREMPP_RESUME_RATE_LIMIT_REDIS_KEY_PREFIX: ${BIOREMPP_RESUME_RATE_LIMIT_REDIS_KEY_PREFIX:-biorempp:resume:ratelimit:}
      BIOREMPP_RESUME_ALERT_WINDOW_SECONDS: ${BIOREMPP_RESUME_ALERT_WINDOW_SECONDS:-300}
      BIOREMPP_RESUME_ALERT_NOT_FOUND_THRESHOLD: ${BIOREMPP_RESUME_ALERT_NOT_FOUND_THRESHOLD:-30}
      BIOREMPP_RESUME_ALERT_TOKEN_MISMATCH_THRESHOLD: ${BIOREMPP_RESUME_ALERT_TOKEN_MISMATCH_THRESHOLD:-10}
      BIOREMPP_RESUME_ALERT_SAVE_FAILED_THRESHOLD: ${BIOREMPP_RESUME_ALERT_SAVE_FAILED_THRESHOLD:-5}
      BIOREMPP_RESUME_REDIS_HOST: ${BIOREMPP_RESUME_REDIS_HOST:-redis}
      BIOREMPP_RESUME_REDIS_PORT: ${BIOREMPP_RESUME_REDIS_PORT:-6379}
      BIOREMPP_RESUME_REDIS_DB: ${BIOREMPP_RESUME_REDIS_DB:-0}
      BIOREMPP_RESUME_REDIS_PASSWORD: ${BIOREMPP_RESUME_REDIS_PASSWORD:-}
      BIOREMPP_RESUME_REDIS_KEY_PREFIX: ${BIOREMPP_RESUME_REDIS_KEY_PREFIX:-biorempp:resume:}
      BIOREMPP_RESUME_REDIS_COMPRESSION_LEVEL: ${BIOREMPP_RESUME_REDIS_COMPRESSION_LEVEL:-6}
      BIOREMPP_RESUME_REDIS_SOCKET_TIMEOUT_SECONDS: ${BIOREMPP_RESUME_REDIS_SOCKET_TIMEOUT_SECONDS:-3}
      BIOREMPP_RESUME_REDIS_HEALTHCHECK: ${BIOREMPP_RESUME_REDIS_HEALTHCHECK:-false}
      
      # Python
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      DOCKER_ENV: true
      
      # Cache (optional)
      ENABLE_CACHE: ${ENABLE_CACHE:-False}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-change-this-redis-password}
    
    ports:
      - "${DEV_PORT:-8050}:8050"
    
    volumes:
      # Hot reload - mount source code
      - ./src:/app/src:rw
      - ./config:/app/config:rw
      - ./biorempp_app.py:/app/biorempp_app.py:rw
      - ./data:/app/data:rw

      # Data persistence
      - biorempp-dev-logs:/app/logs
      - biorempp-dev-cache:/app/cache
    
    networks:
      - biorempp-network
    
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8050/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped

  # ==========================================================================
  # BioRemPP Application (Production)
  # ==========================================================================
  biorempp:
    build:
      context: .
      dockerfile: .docker/Dockerfile
      target: production
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11}
        APP_USER: ${APP_USER:-biorempp}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    image: biorempp:prod
    container_name: biorempp
    profiles: ["prod"]
    
    environment:
      # Application
      BIOREMPP_ENV: production
      BIOREMPP_HOST: ${BIOREMPP_HOST:-0.0.0.0}
      BIOREMPP_PORT: ${BIOREMPP_PORT:-8080}
      BIOREMPP_URL_BASE_PATH: ${BIOREMPP_URL_BASE_PATH:-/}
      BIOREMPP_DEBUG: False
      BIOREMPP_HOT_RELOAD: False
      BIOREMPP_LOG_LEVEL: ${BIOREMPP_LOG_LEVEL:-WARNING}
      BIOREMPP_CACHE_DIR: ${BIOREMPP_CACHE_DIR:-/app/cache}
      BIOREMPP_OBSERVABILITY_ENABLED: ${BIOREMPP_OBSERVABILITY_ENABLED:-false}
      BIOREMPP_OBSERVABILITY_METRICS_PATH: ${BIOREMPP_OBSERVABILITY_METRICS_PATH:-/metrics}
      BIOREMPP_OBSERVABILITY_FAIL_FAST: ${BIOREMPP_OBSERVABILITY_FAIL_FAST:-false}
      BIOREMPP_TRUST_PROXY_HEADERS: ${BIOREMPP_TRUST_PROXY_HEADERS:-true}
      BIOREMPP_TRUSTED_PROXY_CIDRS: ${BIOREMPP_TRUSTED_PROXY_CIDRS:-127.0.0.1/32,::1/128,172.16.0.0/12}
      BIOREMPP_PUBLIC_DATA_ALLOWED_FILES: ${BIOREMPP_PUBLIC_DATA_ALLOWED_FILES:-exemple_dataset.txt}
      BIOREMPP_LOG_REF_SALT: ${BIOREMPP_LOG_REF_SALT:-}
      BIOREMPP_LOG_REF_LENGTH: ${BIOREMPP_LOG_REF_LENGTH:-12}
      PROMETHEUS_MULTIPROC_DIR: ${PROMETHEUS_MULTIPROC_DIR:-/tmp/prometheus_multiproc}
      BIOREMPP_RESUME_BACKEND: ${BIOREMPP_RESUME_BACKEND:-diskcache}
      BIOREMPP_RESUME_TTL_SECONDS: ${BIOREMPP_RESUME_TTL_SECONDS:-14400}
      BIOREMPP_RESUME_CACHE_SIZE_MB: ${BIOREMPP_RESUME_CACHE_SIZE_MB:-1024}
      BIOREMPP_RESUME_MAX_PAYLOAD_MB: ${BIOREMPP_RESUME_MAX_PAYLOAD_MB:-64}
      BIOREMPP_RESUME_SECURITY_MODE: ${BIOREMPP_RESUME_SECURITY_MODE:-strict}
      BIOREMPP_RESUME_RATE_LIMIT_ATTEMPTS: ${BIOREMPP_RESUME_RATE_LIMIT_ATTEMPTS:-10}
      BIOREMPP_RESUME_RATE_LIMIT_WINDOW_SECONDS: ${BIOREMPP_RESUME_RATE_LIMIT_WINDOW_SECONDS:-60}
      BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_BASE_SECONDS: ${BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_BASE_SECONDS:-5}
      BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_MAX_SECONDS: ${BIOREMPP_RESUME_RATE_LIMIT_BACKOFF_MAX_SECONDS:-300}
      BIOREMPP_RESUME_RATE_LIMIT_CACHE_SIZE_MB: ${BIOREMPP_RESUME_RATE_LIMIT_CACHE_SIZE_MB:-64}
      BIOREMPP_RESUME_RATE_LIMIT_BACKEND: ${BIOREMPP_RESUME_RATE_LIMIT_BACKEND:-auto}
      BIOREMPP_RESUME_RATE_LIMIT_REDIS_KEY_PREFIX: ${BIOREMPP_RESUME_RATE_LIMIT_REDIS_KEY_PREFIX:-biorempp:resume:ratelimit:}
      BIOREMPP_RESUME_ALERT_WINDOW_SECONDS: ${BIOREMPP_RESUME_ALERT_WINDOW_SECONDS:-300}
      BIOREMPP_RESUME_ALERT_NOT_FOUND_THRESHOLD: ${BIOREMPP_RESUME_ALERT_NOT_FOUND_THRESHOLD:-30}
      BIOREMPP_RESUME_ALERT_TOKEN_MISMATCH_THRESHOLD: ${BIOREMPP_RESUME_ALERT_TOKEN_MISMATCH_THRESHOLD:-10}
      BIOREMPP_RESUME_ALERT_SAVE_FAILED_THRESHOLD: ${BIOREMPP_RESUME_ALERT_SAVE_FAILED_THRESHOLD:-5}
      BIOREMPP_RESUME_REDIS_HOST: ${BIOREMPP_RESUME_REDIS_HOST:-redis}
      BIOREMPP_RESUME_REDIS_PORT: ${BIOREMPP_RESUME_REDIS_PORT:-6379}
      BIOREMPP_RESUME_REDIS_DB: ${BIOREMPP_RESUME_REDIS_DB:-0}
      BIOREMPP_RESUME_REDIS_PASSWORD: ${BIOREMPP_RESUME_REDIS_PASSWORD:-}
      BIOREMPP_RESUME_REDIS_KEY_PREFIX: ${BIOREMPP_RESUME_REDIS_KEY_PREFIX:-biorempp:resume:}
      BIOREMPP_RESUME_REDIS_COMPRESSION_LEVEL: ${BIOREMPP_RESUME_REDIS_COMPRESSION_LEVEL:-6}
      BIOREMPP_RESUME_REDIS_SOCKET_TIMEOUT_SECONDS: ${BIOREMPP_RESUME_REDIS_SOCKET_TIMEOUT_SECONDS:-3}
      BIOREMPP_RESUME_REDIS_HEALTHCHECK: ${BIOREMPP_RESUME_REDIS_HEALTHCHECK:-false}
      
      # Gunicorn
      BIOREMPP_WORKERS: ${BIOREMPP_WORKERS:-4}
      BIOREMPP_WORKER_CLASS: ${BIOREMPP_WORKER_CLASS:-gevent}
      BIOREMPP_WORKER_CONNECTIONS: ${BIOREMPP_WORKER_CONNECTIONS:-1000}
      BIOREMPP_TIMEOUT: ${BIOREMPP_TIMEOUT:-300}
      BIOREMPP_KEEPALIVE: ${BIOREMPP_KEEPALIVE:-5}
      BIOREMPP_MAX_REQUESTS: ${BIOREMPP_MAX_REQUESTS:-1000}
      BIOREMPP_MAX_REQUESTS_JITTER: ${BIOREMPP_MAX_REQUESTS_JITTER:-100}
      BIOREMPP_LIMIT_REQUEST_LINE: ${BIOREMPP_LIMIT_REQUEST_LINE:-4096}
      BIOREMPP_LIMIT_REQUEST_FIELD_SIZE: ${BIOREMPP_LIMIT_REQUEST_FIELD_SIZE:-8190}
      BIOREMPP_LIMIT_REQUEST_FIELDS: ${BIOREMPP_LIMIT_REQUEST_FIELDS:-100}
      BIOREMPP_MAX_REQUEST_BODY_BYTES: ${BIOREMPP_MAX_REQUEST_BODY_BYTES:-5242880}
      
      # Python
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      
      # Security
      SECRET_KEY: ${SECRET_KEY:-}
      
      # Cache (optional)
      ENABLE_CACHE: ${ENABLE_CACHE:-False}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      
      # Reverse proxy domain (TLS is terminated upstream/institutional ingress)
      DOMAIN: ${DOMAIN:-localhost}
    
    # Production hardening: app is internal-only, ingress via nginx service.
    expose:
      - "8080"
    
    volumes:
      # Data persistence only (no source code mounting)
      - biorempp-logs:/app/logs
      - biorempp-data:/app/data
      - biorempp-cache:/app/cache

    tmpfs:
      - /tmp/prometheus_multiproc:size=${BIOREMPP_OBSERVABILITY_MULTIPROC_TMPFS_SIZE_BYTES:-67108864}
    
    networks:
      - biorempp-network

    depends_on:
      biorempp-volume-init:
        condition: service_completed_successfully
    
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    restart: unless-stopped
    
    # Resource limits (adjust based on server capacity)
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  # ==========================================================================
  # Nginx Reverse Proxy (Production)
  # ==========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: biorempp-nginx
    profiles: ["prod", "nginx"]

    environment:
      DOMAIN: ${DOMAIN:-localhost}
    
    ports:
      - "${HTTP_PORT:-81}:80"
    
    volumes:
      # Configuration
      - ./.docker/nginx/${NGINX_CONFIG:-nginx.prod.conf}:/etc/nginx/templates/default.conf.template:ro
      
      # Static files (optional - serve directly from nginx)
      - ./src/assets:/app/src/assets:ro
      
      # Logs
      - nginx-logs:/var/log/nginx
    
    networks:
      - biorempp-network
    
    depends_on:
      biorempp:
        condition: service_healthy
    
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    
    restart: unless-stopped

  # ==========================================================================
  # Nginx TLS Mock Certificate Bootstrap (Local Validation Only)
  # ==========================================================================
  nginx-mock-certgen:
    image: alpine:3.20
    container_name: biorempp-nginx-mock-certgen
    profiles: ["nginx-mock"]

    environment:
      DOMAIN: ${DOMAIN:-localhost}
      TLS_MOCK_CERT_DAYS: ${TLS_MOCK_CERT_DAYS:-365}

    command: >
      sh -c "set -eu;
             CERT_DIR=/certs;
             CRT=$${CERT_DIR}/biorempp-mock.crt;
             KEY=$${CERT_DIR}/biorempp-mock.key;
             if [ ! -s \"$${CRT}\" ] || [ ! -s \"$${KEY}\" ]; then
               apk add --no-cache openssl >/dev/null;
               openssl req -x509 -nodes -newkey rsa:2048 -sha256 -days \"$${TLS_MOCK_CERT_DAYS}\" -subj \"/CN=$${DOMAIN}\" -keyout \"$${KEY}\" -out \"$${CRT}\";
               chmod 600 \"$${KEY}\";
               chmod 644 \"$${CRT}\";
               echo '[INFO] Generated self-signed TLS mock certificate';
             else
               echo '[INFO] Reusing existing TLS mock certificate';
             fi"

    volumes:
      - nginx-mock-certs:/certs

    networks:
      - biorempp-network

    restart: "no"

  # ==========================================================================
  # Nginx Reverse Proxy (TLS Mock - Local Validation)
  # ==========================================================================
  nginx-mock:
    image: nginx:1.25-alpine
    container_name: biorempp-nginx-mock
    profiles: ["nginx-mock"]

    environment:
      DOMAIN: ${DOMAIN:-localhost}

    ports:
      - "${HTTP_MOCK_PORT_BIND:-127.0.0.1:8081}:80"
      - "${HTTPS_MOCK_PORT_BIND:-127.0.0.1:8443}:443"

    volumes:
      - ./.docker/nginx/nginx.prod.tls-mock.conf:/etc/nginx/templates/default.conf.template:ro
      - nginx-mock-certs:/etc/nginx/certs:ro
      - ./src/assets:/app/src/assets:ro
      - nginx-logs:/var/log/nginx

    networks:
      - biorempp-network

    depends_on:
      biorempp:
        condition: service_healthy
      nginx-mock-certgen:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD-SHELL", "wget --no-check-certificate --quiet --tries=1 --spider https://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    restart: unless-stopped

  # ==========================================================================
  # Redis Cache (Optional)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: biorempp-redis
    profiles: ["cache"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    
    command: >
      sh -c "if [ -z \"$${REDIS_PASSWORD}\" ] ||
             [ \"$${REDIS_PASSWORD}\" = \"change-this-redis-password\" ] ||
             [ \"$${REDIS_PASSWORD}\" = \"__SET_IN_PROD__\" ] ||
             [ \"$${REDIS_PASSWORD}\" = \"REPLACE_WITH_REAL_SECRET_FROM_DOCKER_SECRETS\" ]; then
               echo '[ERROR] REDIS_PASSWORD is required and must be secure in production';
               exit 1;
             fi;
             exec redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\" --maxmemory ${REDIS_MAXMEMORY:-512mb} --maxmemory-policy allkeys-lru"
    
    expose:
      - "6379"
    
    volumes:
      - redis-data:/data
    
    networks:
      - biorempp-network
    
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    restart: unless-stopped

  # ==========================================================================
  # Prometheus (Observability)
  # ==========================================================================
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: biorempp-prometheus
    profiles: ["observability"]

    entrypoint:
      - /bin/sh
      - /etc/prometheus/entrypoint.sh

    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION_TIME:-15d}
      - --storage.tsdb.retention.size=${PROMETHEUS_RETENTION_SIZE:-5GB}
      - --web.enable-lifecycle

    environment:
      BIOREMPP_HTTP_ERROR_RATIO_THRESHOLD: ${BIOREMPP_HTTP_ERROR_RATIO_THRESHOLD:-0.05}
      BIOREMPP_HTTP_P95_LATENCY_SECONDS_THRESHOLD: ${BIOREMPP_HTTP_P95_LATENCY_SECONDS_THRESHOLD:-2}
      BIOREMPP_RESUME_ALERT_WINDOW: ${BIOREMPP_RESUME_ALERT_WINDOW:-5m}
      BIOREMPP_RESUME_ALERT_NOT_FOUND_THRESHOLD: ${BIOREMPP_RESUME_ALERT_NOT_FOUND_THRESHOLD:-10}
      BIOREMPP_RESUME_ALERT_TOKEN_MISMATCH_THRESHOLD: ${BIOREMPP_RESUME_ALERT_TOKEN_MISMATCH_THRESHOLD:-5}
      BIOREMPP_RESUME_ALERT_SAVE_FAILED_THRESHOLD: ${BIOREMPP_RESUME_ALERT_SAVE_FAILED_THRESHOLD:-2}
      BIOREMPP_RESUME_ALERT_RATE_LIMITED_THRESHOLD: ${BIOREMPP_RESUME_ALERT_RATE_LIMITED_THRESHOLD:-20}
      BIOREMPP_RESUME_ALERT_RATE_LIMIT_ERROR_THRESHOLD: ${BIOREMPP_RESUME_ALERT_RATE_LIMIT_ERROR_THRESHOLD:-0}
      BIOREMPP_WORKERS_ACTIVE_MIN_THRESHOLD: ${BIOREMPP_WORKERS_ACTIVE_MIN_THRESHOLD:-2}
      BIOREMPP_WORKER_RESTART_RATE_THRESHOLD: ${BIOREMPP_WORKER_RESTART_RATE_THRESHOLD:-0.1}
      BIOREMPP_CACHE_HIT_RATIO_MIN_THRESHOLD: ${BIOREMPP_CACHE_HIT_RATIO_MIN_THRESHOLD:-0.2}

    ports:
      - "${PROMETHEUS_PORT_BIND:-127.0.0.1:9090}:9090"

    volumes:
      - ./.docker/prometheus-entrypoint.sh:/etc/prometheus/entrypoint.sh:ro
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/rules/recording.yml:/etc/prometheus/rules/recording.yml:ro
      - ./observability/prometheus/rules/alerts.template.yml:/etc/prometheus/rules/alerts.template.yml:ro
      - prometheus-data:/prometheus

    networks:
      - biorempp-network

    depends_on:
      biorempp:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    restart: unless-stopped

  # ==========================================================================
  # Grafana (Observability)
  # ==========================================================================
  grafana:
    image: grafana/grafana:11.3.2
    container_name: biorempp-grafana
    profiles: ["observability"]

    ports:
      - "${GRAFANA_PORT_BIND:-127.0.0.1:3000}:3000"

    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-}
      GF_USERS_ALLOW_SIGN_UP: ${GRAFANA_ALLOW_SIGN_UP:-false}
      GF_ANALYTICS_REPORTING_ENABLED: ${GRAFANA_ANALYTICS_REPORTING_ENABLED:-false}
      GF_ANALYTICS_CHECK_FOR_UPDATES: ${GRAFANA_ANALYTICS_CHECK_FOR_UPDATES:-false}
      GF_SERVER_ROOT_URL: ${GRAFANA_SERVER_ROOT_URL:-http://localhost:3000}

    entrypoint:
      - /bin/sh
      - -c
      - >
        if [ -z "$${GF_SECURITY_ADMIN_PASSWORD}" ] ||
           [ "$${GF_SECURITY_ADMIN_PASSWORD}" = "change-this-grafana-password" ] ||
           [ "$${GF_SECURITY_ADMIN_PASSWORD}" = "__SET_IN_PROD__" ]; then
          echo '[ERROR] GRAFANA_ADMIN_PASSWORD is required and must be secure in production';
          exit 1;
        fi;
        exec /run.sh

    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

    networks:
      - biorempp-network

    depends_on:
      prometheus:
        condition: service_healthy

    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    restart: unless-stopped

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  biorempp-network:
    name: biorempp-network
    driver: bridge

# ============================================================================
# VOLUMES
# ============================================================================
volumes:
  # Development
  biorempp-dev-logs:
    name: biorempp-dev-logs
  biorempp-dev-cache:
    name: biorempp-dev-cache
  
  # Production
  biorempp-logs:
    name: biorempp-logs
  biorempp-data:
    name: biorempp-data
  biorempp-cache:
    name: biorempp-cache
  
  # Nginx
  nginx-logs:
    name: nginx-logs
  nginx-mock-certs:
    name: nginx-mock-certs
  
  # Redis
  redis-data:
    name: redis-data

  # Observability
  prometheus-data:
    name: biorempp-prometheus-data
  grafana-data:
    name: biorempp-grafana-data
