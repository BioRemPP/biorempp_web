name: Resume Rate-Limit Redis Integration

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/presentation/callbacks/job_resume_callbacks.py"
      - "src/presentation/services/job_resume_service.py"
      - "src/presentation/services/resume_store_redis.py"
      - "tests/integration/test_resume_rate_limit_redis.py"
      - ".github/workflows/resume-rate-limit-integration.yml"

jobs:
  redis-integration:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,cache]"

      - name: Run Redis integration tests
        env:
          BIOREMPP_RESUME_REDIS_HOST: 127.0.0.1
          BIOREMPP_RESUME_REDIS_PORT: 6379
          BIOREMPP_RESUME_REDIS_DB: 15
          BIOREMPP_RESUME_REDIS_PASSWORD: ""
        run: |
          pytest tests/integration/test_resume_rate_limit_redis.py -q -m integration
