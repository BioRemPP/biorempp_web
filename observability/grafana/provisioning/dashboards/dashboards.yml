apiVersion: 1

providers:
  - name: BioRemPP Dashboards
    orgId: 1
    folder: BioRemPP
    folderUid: biorempp
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
