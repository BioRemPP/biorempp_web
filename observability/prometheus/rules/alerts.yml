groups:
  - name: biorempp_app_alerts
    rules:
      - alert: BioRemPPAppDown
        expr: up{job="biorempp-app"} == 0
        for: 1m
        labels:
          severity: critical
          service: biorempp
        annotations:
          summary: "BioRemPP target is down"
          description: "Prometheus cannot scrape the biorempp-app target."

      - alert: BioRemPPHighHttpErrorRatio
        expr: job:biorempp_http_error_ratio:rate5m > 0.05
        for: 5m
        labels:
          severity: warning
          service: biorempp
        annotations:
          summary: "HTTP error ratio above 5%"
          description: "Error ratio stayed above 5% for 5 minutes."

      - alert: BioRemPPHighHttp5xxRate
        expr: job:biorempp_http_5xx_ratio:rate5m > 0.025
        for: 5m
        labels:
          severity: critical
          service: biorempp
        annotations:
          summary: "HTTP 5xx ratio above 2.5%"
          description: "Server-side error ratio stayed above 2.5% for 5 minutes."

      - alert: BioRemPPHighHttp4xxRate
        expr: job:biorempp_http_4xx_ratio:rate5m > 0.1
        for: 10m
        labels:
          severity: warning
          service: biorempp
        annotations:
          summary: "HTTP 4xx ratio above 10%"
          description: "Client-facing error ratio stayed above 10% for 10 minutes."

      - alert: BioRemPPErrorEndpointHotspot
        expr: endpoint:biorempp_http_error_ratio:rate5m > 0.1 and sum by (endpoint) (rate(biorempp_http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: warning
          service: biorempp
        annotations:
          summary: "Endpoint error hotspot detected"
          description: "An endpoint kept error ratio above 10% under sustained traffic."

      - alert: BioRemPPHighHttpLatencyP95
        expr: endpoint:biorempp_http_latency_p95:rate5m > 2
        for: 5m
        labels:
          severity: warning
          service: biorempp
        annotations:
          summary: "P95 latency above 2s on {{ $labels.endpoint }}"
          description: "Endpoint P95 latency has remained above 2 seconds."

  - name: biorempp_resume_alerts
    rules:
      - alert: BioRemPPResumeNotFoundSpike
        expr: increase(biorempp_resume_load_attempts_total{outcome="not_found"}[5m]) > 10
        for: 1m
        labels:
          severity: warning
          service: biorempp
        annotations:
          summary: "Resume not_found spike"
          description: "More than 10 not_found resume loads were observed in 5 minutes."

      - alert: BioRemPPResumeTokenMismatchSpike
        expr: increase(biorempp_resume_load_attempts_total{outcome="token_mismatch"}[5m]) > 5
        for: 1m
        labels:
          severity: warning
          service: biorempp
        annotations:
          summary: "Resume token mismatch spike"
          description: "More than 5 token_mismatch events were observed in 5 minutes."

      - alert: BioRemPPResumeSaveFailedSpike
        expr: increase(biorempp_resume_save_total{outcome="save_failed"}[5m]) > 2
        for: 1m
        labels:
          severity: critical
          service: biorempp
        annotations:
          summary: "Resume save_failed spike"
          description: "More than 2 save_failed resume events were observed in 5 minutes."

      - alert: BioRemPPResumeRateLimitedSpike
        expr: increase(biorempp_resume_callback_attempts_total{outcome="rate_limited"}[5m]) > 20
        for: 2m
        labels:
          severity: warning
          service: biorempp
        annotations:
          summary: "Resume rate-limited spike"
          description: "More than 20 resume requests were rate-limited in 5 minutes."

      - alert: BioRemPPResumeRateLimitBackendErrors
        expr: increase(biorempp_resume_rate_limit_errors_total[5m]) > 0
        for: 2m
        labels:
          severity: warning
          service: biorempp
        annotations:
          summary: "Resume rate-limit backend errors detected"
          description: "Rate-limit backend emitted errors during init/evaluate/reset."

  - name: biorempp_worker_alerts
    rules:
      - alert: BioRemPPLowWorkerCount
        expr: biorempp_workers_active < 2
        for: 2m
        labels:
          severity: critical
          service: biorempp
        annotations:
          summary: "Active worker count below expected minimum"
          description: "biorempp_workers_active is below 2."

      - alert: BioRemPPFrequentWorkerRestarts
        expr: sum(rate(biorempp_worker_restarts_total[10m])) > 0.1
        for: 5m
        labels:
          severity: warning
          service: biorempp
        annotations:
          summary: "Frequent worker restarts"
          description: "Worker restart rate is above 0.1/s in the last 10 minutes."

  - name: biorempp_cache_alerts
    rules:
      - alert: BioRemPPLowCacheHitRatio
        expr: cache_type:biorempp_cache_get_hit_ratio:rate5m < 0.2
        for: 10m
        labels:
          severity: warning
          service: biorempp
        annotations:
          summary: "Low cache hit ratio for {{ $labels.cache_type }}"
          description: "Cache hit ratio stayed below 20% for 10 minutes."
