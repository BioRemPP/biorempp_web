global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    application: biorempp-web
    environment: production

rule_files:
  - /etc/prometheus/rules/alerts.yml
  - /etc/prometheus/rules/recording.yml

scrape_configs:
  - job_name: biorempp-app
    metrics_path: /metrics
    static_configs:
      - targets:
          - biorempp:8080
        labels:
          service: biorempp
          tier: web

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus
