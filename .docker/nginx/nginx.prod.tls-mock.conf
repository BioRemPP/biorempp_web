# ============================================================================
# BioRemPP v1.0 - Nginx Configuration (TLS Mock for Local Validation)
# ============================================================================
# This profile is intended for local HTTPS validation only (self-signed cert).
# Institutional production keeps TLS termination at upstream ingress.
# ============================================================================

upstream biorempp_app {
    server biorempp:8080 fail_timeout=10s max_fails=3;
}

# Prefer proto forwarded by upstream; fallback to current request scheme.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

# Preserve ingress request correlation id or fallback to nginx generated id.
map $http_x_request_id $request_id_forwarded {
    default $http_x_request_id;
    "" $request_id;
}

# Local mock HTTP endpoint: redirect to HTTPS.
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};
    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${DOMAIN};

    ssl_certificate /etc/nginx/certs/biorempp-mock.crt;
    ssl_certificate_key /etc/nginx/certs/biorempp-mock.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Compression is handled at ingress in institutional deployments.
    gzip off;

    # Dash callbacks can post merged-result payloads larger than upload size.
    # Upload limits are still validated at application level.
    client_max_body_size 32M;
    client_body_buffer_size 128k;

    # Timeouts
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Logging
    access_log /var/log/nginx/biorempp_tls_mock_access.log;
    error_log /var/log/nginx/biorempp_tls_mock_error.log warn;

    # Security headers (no strict HSTS in local mock)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:; connect-src 'self' https: wss: ws:;" always;

    # Static files (if served by Nginx)
    location /assets/ {
        alias /app/src/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket support for Dash
    location /_dash-update-component {
        proxy_pass http://biorempp_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id_forwarded;
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;
        proxy_set_header X-B3-TraceId $http_x_b3_traceid;
        proxy_set_header b3 $http_b3;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # Internal metrics endpoint (deny external clients)
    location /metrics {
        access_log off;
        allow 10.0.0.0/8;
        deny all;

        proxy_pass http://biorempp_app/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id_forwarded;
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;
        proxy_set_header X-B3-TraceId $http_x_b3_traceid;
        proxy_set_header b3 $http_b3;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Main application proxy
    location / {
        proxy_pass http://biorempp_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id_forwarded;
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;
        proxy_set_header X-B3-TraceId $http_x_b3_traceid;
        proxy_set_header b3 $http_b3;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://biorempp_app/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id_forwarded;
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;
        proxy_set_header X-B3-TraceId $http_x_b3_traceid;
        proxy_set_header b3 $http_b3;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
}
