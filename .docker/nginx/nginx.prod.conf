# ============================================================================
# BioRemPP v1.0 - Nginx Configuration (Production HTTP Proxy)
# ============================================================================
# TLS is expected to be terminated by institutional ingress/load balancer.
# This container handles internal HTTP reverse-proxy duties only.
# ============================================================================

upstream biorempp_app {
    server biorempp:8080 fail_timeout=10s max_fails=3;
}

# Prefer proto forwarded by institutional ingress; fallback to current scheme.
map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

# Preserve ingress request correlation id or fallback to nginx generated id.
map $http_x_request_id $request_id_forwarded {
    default $http_x_request_id;
    "" $request_id;
}

server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    # Compression is handled at institutional ingress layer.
    gzip off;

    # Client body settings
    # Dash callbacks can post merged-result payloads larger than upload size.
    # Upload limits are still validated at application level.
    client_max_body_size 32M;
    client_body_buffer_size 128k;

    # Timeouts
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    send_timeout 300s;

    # Logging
    access_log /var/log/nginx/biorempp_access.log;
    error_log /var/log/nginx/biorempp_error.log warn;

    # Baseline security headers (without HSTS because TLS is terminated upstream)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:; connect-src 'self' https: wss: ws:;" always;

    # Static files (if served by Nginx)
    location /assets/ {
        alias /app/src/assets/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # WebSocket support for Dash
    location /_dash-update-component {
        proxy_pass http://biorempp_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id_forwarded;
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;
        proxy_set_header X-B3-TraceId $http_x_b3_traceid;
        proxy_set_header b3 $http_b3;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # Internal metrics endpoint (deny external clients)
    location /metrics {
        access_log off;
        allow 10.0.0.0/8;
        deny all;

        proxy_pass http://biorempp_app/metrics;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id_forwarded;
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;
        proxy_set_header X-B3-TraceId $http_x_b3_traceid;
        proxy_set_header b3 $http_b3;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    # Main application proxy
    location / {
        proxy_pass http://biorempp_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id_forwarded;
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;
        proxy_set_header X-B3-TraceId $http_x_b3_traceid;
        proxy_set_header b3 $http_b3;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Buffer settings
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }

    # Health check endpoint
    location /health {
        access_log off;
        proxy_pass http://biorempp_app/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id_forwarded;
        proxy_set_header traceparent $http_traceparent;
        proxy_set_header tracestate $http_tracestate;
        proxy_set_header X-B3-TraceId $http_x_b3_traceid;
        proxy_set_header b3 $http_b3;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }
}
